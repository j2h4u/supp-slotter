    - 'Morning / empty stomach: Best Naturals - Acetyl L-Carnitine (ALCAR), BioGrace
      - Vitamin B5 (pantothenic acid)'
    - 'Morning / with breakfast: Country Life - Coenzyme B-Complex (active/coenzymated
      B-vitamins), Futurebiotics - Vitamin D3 (cholecalciferol), Life Extension -
      Only Trace Minerals (multi-trace-mineral complex), NOW Foods - Potassium Citrate
      99 mg'
