# Detailed review warnings behind action_points.
# Warnings are prompts for human review; they are not medical advice.
warnings:
- category: Component conflict inside one product
  product: Life Extension - Only Trace Minerals (multi-trace-mineral complex)
  source: Zinc (monomethionine / L-OptiZinc)
  target: Copper (bisglycinate)
  concern: competes
  note: Component relation conflicts inside one physical product; scheduling keeps
    the product together and emits this warning
  action: Keep zinc and copper away from the same slot when they are in separate products.
- category: Safety concern
  product: Futurebiotics - Vitamin D3 (cholecalciferol)
  concern: safety concern
  note: 10,000 IU/day vitamin D3 exceeds the usual adult tolerable upper intake level;
    use should be lab-guided and reviewed for cumulative D3, calcium, and hypercalcemia
    context.
  action: Review this safety concern before treating the schedule as final.
- category: Safety concern
  product: Vitamir (Ежовик Комплекс) - Lion's Mane + B6 Complex (Vitamir Ежовик Комплекс)
  substance: Vitamin B6 (pyridoxine HCl)
  concern: safety concern
  note: 'Long-term high-dose pyridoxine HCl intake causes sensory neuropathy (vitamin
    B6 toxicity); HCl form can accumulate as a pseudo-antagonist unlike the active
    P5P form. Review cumulative daily B6 intake across all products. Source: StatPearls
    Vitamin B6/Pyridoxine; NIH ODS Vitamin B6.'
  action: Review this safety concern before treating the schedule as final.
- category: Safety concern
  product: Best Naturals - Acetyl L-Carnitine (ALCAR)
  substance: L-Carnitine (acetyl)
  concern: safety concern
  note: TMAO cardiovascular risk is gut-microbiome and host-context dependent; surface
    as cardiometabolic review context rather than treating L-carnitine as directly
    harmful in isolation.
  action: Review this safety concern before treating the schedule as final.
- category: Safety concern
  product: Minami Healthy Foods - Nattokinase 13000FU
  substance: Nattokinase
  concern: safety concern
  note: Contraindicated with anticoagulants (warfarin, heparin) and antiplatelet drugs
    including aspirin; do not take within several days of surgery. Fibrinolytic action
    potentiates bleeding risk — review if aspirin or other antiplatelets are in the
    active stack.
  action: Review this safety concern before treating the schedule as final.
- category: Safety concern
  product: Tadalista - Tadalafil
  substance: Tadalafil
  concern: safety concern
  note: PDE5 inhibitor context should be reviewed with nitrates, alpha-blockers, antihypertensives,
    alcohol, and other vasodilators because symptomatic hypotension can become the
    limiting stack risk.
  action: Review this safety concern before treating the schedule as final.
- category: Safety concern
  product: TiM - Electrolyte Caps (multi-electrolyte)
  substance: Potassium (citrate)
  concern: safety concern
  note: K-Na electrolyte balance — high sodium intake can reduce K retention; not
    absorption competition, but a real intra-day intake balance consideration
  action: Review this safety concern before treating the schedule as final.
- category: Safety concern
  product: L-Citrulline Malate
  substance: L-Citrulline (malate)
  concern: safety concern
  note: Additive hypotensive effect when combined with PDE5 inhibitors (tadalafil,
    sildenafil) or other vasodilators — directly relevant if tadalafil is active in
    the stack. Monitor for symptomatic hypotension.
  action: Review this safety concern before treating the schedule as final.
- category: Safety concern
  product: Primecraft - L-Carnitine L-Tartrate (LCLT)
  substance: L-Carnitine (L-tartrate)
  concern: safety concern
  note: TMAO cardiovascular risk is gut-microbiome and host-context dependent; surface
    as cardiometabolic review context rather than treating L-carnitine as directly
    harmful in isolation.
  action: Review this safety concern before treating the schedule as final.
