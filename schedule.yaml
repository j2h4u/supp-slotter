    - 'Post-workout: Primecraft - L-Carnitine L-Tartrate (LCLT), TiM - Electrolyte
      Caps (multi-electrolyte)'
# Highest-signal review actions from warnings and planner constraints.
# These are prompts for human review, not medical advice.
action_points:
- 'Life Extension - Only Trace Minerals (multi-trace-mineral complex): Keep zinc and
  copper away from the same slot when they are in separate products.'
- 'Unresolved active concerns: Review unresolved active concerns before treating the
  schedule as final.'
- 'Life Extension - Only Trace Minerals (multi-trace-mineral complex): Review total
  daily amount across products and avoid accidental stacking.'
- 'NOW Foods - Potassium Citrate 99 mg; TiM - Electrolyte Caps (multi-electrolyte):
  Review potassium-related medication context before using this stack.'
- 'Minami Healthy Foods - Nattokinase 13000FU: Review combined bleeding-risk context,
  especially with anticoagulants, antiplatelets, surgery, or procedures.'
- 'L-Citrulline Malate; Tadalista - Tadalafil: Review additive blood-pressure lowering
  context before combining vasodilator or NO-pathway products.'
