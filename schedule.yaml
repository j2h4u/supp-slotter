# Generated by `uv run python -m planner`; edit source cards under data/, not this file.
# Short human-facing summary.
# `take` is grouped by pillbox so daily and training products do not read as one regimen.
summary:
  take:
    daily:
    - 'Morning / empty stomach: Best Naturals - Acetyl L-Carnitine (ALCAR), Nattokinase
      6000 FU, 120 caps'
    - 'Morning / with breakfast: BioGrace - Vitamin B5 (pantothenic acid), Futurebiotics
      - Vitamin D3 (cholecalciferol), Harmony Aqua - Astaxanthin, Nature''s Truth
      - Antarctic Krill Oil'
    - 'Day / with meal: Country Life - Coenzyme B-Complex (active/coenzymated B-vitamins),
      Life Extension - Only Trace Minerals (multi-trace-mineral complex), VitaMeal
      - Vitamin C, 800 mg, Vitamir (Ежовик Комплекс) - Lion''s Mane + B6 Complex (Vitamir
      Ежовик Комплекс)'
    - 'Before sleep / empty stomach: Tadalista - Tadalafil, Vitamir - Magnesium glycinate'
    training:
    - 'Pre-workout: Do4a - Creatine monohydrate, L-Citrulline Malate'
    - 'Post-workout: Primecraft - L-Carnitine L-Tartrate (LCLT), TiM - Electrolyte
      Caps (multi-electrolyte)'
# Non-warning placement compromises.
# These explain acceptable but imperfect slot choices; they are not safety warnings.
placement_notes:
- product: TiM - Electrolyte Caps (multi-electrolyte)
  pillbox: training
  slot: post_workout
  notes:
  - 'Prefers food: tradeoff; preferred slot condition was not available here.'
- product: Vitamir - Magnesium glycinate
  pillbox: daily
  slot: evening_empty
  notes:
  - 'Prefers food: tradeoff; preferred slot condition was not available here.'
# Planned pillboxes and their intake slots.
# `products` lists scheduled product names; `substances` expands those products for human review.
pillboxes:
  daily:
    label: Daily
    slots:
      morning_empty:
        label: Morning / empty stomach
        products:
        - Best Naturals - Acetyl L-Carnitine (ALCAR)
        - Nattokinase 6000 FU, 120 caps
        substances:
        - L-Carnitine (acetyl)
        - Nattokinase
      morning_food:
        label: Morning / with breakfast
        products:
        - BioGrace - Vitamin B5 (pantothenic acid)
        - Futurebiotics - Vitamin D3 (cholecalciferol)
        - Harmony Aqua - Astaxanthin
        - Nature's Truth - Antarctic Krill Oil
        substances:
        - Astaxanthin
        - Docosahexaenoic acid
        - Eicosapentaenoic acid
        - Krill Oil
        - Vitamin B5 (pantothenic acid)
        - Vitamin D3 (cholecalciferol)
      day_food:
        label: Day / with meal
        products:
        - Country Life - Coenzyme B-Complex (active/coenzymated B-vitamins)
        - Life Extension - Only Trace Minerals (multi-trace-mineral complex)
        - VitaMeal - Vitamin C, 800 mg
        - Vitamir (Ежовик Комплекс) - Lion's Mane + B6 Complex (Vitamir Ежовик Комплекс)
        substances:
        - Boron
        - Chromium
        - Copper (bisglycinate)
        - Lion's Mane
        - Manganese
        - Molybdenum
        - Sodium
        - Vanadium
        - Vitamin B1 (thiamine)
        - Vitamin B12 (methylcobalamin)
        - Vitamin B2 (riboflavin)
        - Vitamin B3 (niacin)
        - Vitamin B5 (pantothenic acid)
        - Vitamin B6 (pyridoxal 5 phosphate)
        - Vitamin B6 (pyridoxine HCl)
        - Vitamin B7 (biotin)
        - Vitamin B9 (methylfolate)
        - Vitamin C (sodium ascorbate)
        - Zinc (monomethionine / L-OptiZinc)
      evening_empty:
        label: Before sleep / empty stomach
        products:
        - Tadalista - Tadalafil
        - Vitamir - Magnesium glycinate
        substances:
        - Magnesium (glycinate)
        - Tadalafil
  training:
    label: Training
    slots:
      pre_workout:
        label: Pre-workout
        products:
        - Do4a - Creatine monohydrate
        - L-Citrulline Malate
        substances:
        - Creatine (monohydrate)
        - L-Citrulline (malate)
      post_workout:
        label: Post-workout
        products:
        - Primecraft - L-Carnitine L-Tartrate (LCLT)
        - TiM - Electrolyte Caps (multi-electrolyte)
        substances:
        - Calcium (dicalcium phosphate)
        - Calcium (lactate)
        - L-Carnitine (L-tartrate)
        - Magnesium (citrate)
        - Potassium (citrate)
        - Sodium
