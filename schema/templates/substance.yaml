# =============================================================================
# Substance card template
# =============================================================================
# Copy this file to data/substances/<slug>.yaml and fill it in.
# Filename convention: <slug>.yaml (no ID — planner check assigns it and
# renames the file to <slug>__sub_XXXXXXXXXX.yaml automatically).
#
# REQUIRED fields: name
# All other fields are optional but should be filled where applicable.
#
# Full ontology reference: docs/domain-model.md
# =============================================================================

# id is assigned by planner check — do NOT set it manually.
# Leave the field absent and run: planner check

name: ""  # Required. Canonical substance name. Use the most specific form that
          # applies, e.g. "Magnesium" not "Mag". The form: field captures the
          # specific formulation.

# form: ""  # Specific formulation, e.g. "glycinate", "pyridoxine HCl", "as retinol".
            # Shown in parentheses in the schedule. Use when the substance name alone
            # is ambiguous (e.g. two "Vitamin B6" forms need distinct form: values).

# aliases: []  # Alternative names this substance is known by.
               # Example:
               #   aliases:
               #   - 5-hydroxytryptophan
               #   - Griffonia extract

# notes: ""  # Free-form notes about this substance — sourcing, dosing context,
             # label discrepancies, evidence caveats. Not shown in schedule output.
             # Use for anything an agent should know that doesn't fit structured fields.

# ---------------------------------------------------------------------------
# SCHEDULING — read by Planner
# The schedule: section is the only data the Planner reads (plus knowledge.is:
# narrowly, for class-level competes). Putting a slug under knowledge:effect or
# knowledge:risk does NOT affect slot assignment — it only surfaces in
# `planner review`.
# ---------------------------------------------------------------------------

# schedule:
#   intake:                   # MAX ONE slug. Absorption / food interaction.
#   - food_preferred          # Values: empty_preferred | fat_meal_required |
#                             #         food_preferred | food_neutral | food_required
#   timing:                   # MAX ONE slug. Scheduling-relevant effect.
#   - sleep_support           # Values: energy_like | sleep_disruptive | sleep_support
#                             # (any other effect slug goes under knowledge.effect)
#   activity:                 # MAX ONE slug. Training-context specificity.
#   - pre_workout             # Values: pre_workout | post_workout | any_workout
#                             # Substances with activity: MUST be in the training stack.
#   prefer_with:              # Substance IDs (sub_*) to co-schedule when possible.
#   - sub_xxxxxxxxxx          # Planner awards a bonus for placing prefer_with pairs together.

# ---------------------------------------------------------------------------
# KNOWLEDGE — read by Reviewer
# These fields do not affect slot assignment. They surface in `planner review`
# for a smart agent to interpret. Trait-backed namespaces are validated against
# data/traits/. context: is validated against data/dashboards/.
# ---------------------------------------------------------------------------

# knowledge:
#   is:                       # Structural classification. Used for class-level
#   - mineral                 # competes rules and dashboard/context membership.
#                             # See data/traits/classes.yaml for valid slugs.
#   effect:                   # Non-scheduling pharmacological effects.
#   - vasodilator             # See data/traits/effects.yaml for valid slugs.
#                             # Examples: vasodilator, cholinergic_support,
#                             # pde5_inhibition, fibrinolytic
#   risk:                     # Safety / interaction flags surfaced by `planner review`.
#   - manual_review           # NOT used for slot assignment. See data/traits/risks.yaml.
#                             # Examples: manual_review, stimulant, anticoagulant
#   context:                  # Curated review-context membership for dashboard views.
#   - vascular_health         # See data/dashboards/ for valid context names.
#   pathway:                  # Metabolic pathway membership.
#   - methylation_cycle       # See data/traits/pathways.yaml for valid slugs.

# ---------------------------------------------------------------------------
# CONCERNS
# Documented caveats, safety notes, and data quality issues. These appear in
# planner review > Safety / Data Quality / Model Gaps with active/inactive/
# knowledge-only membership labels. Add one entry per distinct concern. Do not
# over-flag — only add what is actionable or genuinely uncertain.
# ---------------------------------------------------------------------------

# concerns:
# - kind: safety        # safety | model_gap | data_quality
#   text: ""            # Specific concern text. State the mechanism, the source
#                       # if known, and whether it is currently relevant.
#
# - kind: data_quality
#   text: ""
#
# - kind: model_gap
#   text: ""            # Use for cases where the planner's trait/relation model
#                       # cannot fully represent a known property of this substance.
