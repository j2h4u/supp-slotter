id: https://j2h4u.github.io/supp-slotter/ontology/v1/model
name: supp_slotter_model
prefixes:
  ss: https://j2h4u.github.io/supp-slotter/ontology/v1/
  linkml: https://w3id.org/linkml/
default_prefix: ss
default_range: string
imports:
  - linkml:types
classes:
  OntologyTerm:
    description: A controlled semantic term with an explicit OntoClean profile.
    slots: [slug, label, description, semantic_category, assertion_kind, allowed_predicates, ontoclean_profile]
  Substance:
    description: Stable reusable supplement substance.
    slots: [id, label]
  Product:
    description: Stable labelled product composed of substances.
    slots: [id, label]
  RelationSelector:
    description: A typed selector over an entity or controlled term.
    slots: [selector_category, selects_term, selects_entity]
  OntologyAssertion:
    description: A governed non-blocking semantic assertion over two selectors.
    slots: [id, assertion_kind, semantic_family, source_selector, target_selector, reason]
  ClinicalReviewSignal:
    is_a: OntologyAssertion
    description: A review signal that preserves a clinical interaction or balance concern without creating a planner block.
  SchedulingConstraint:
    description: A governed planner operational constraint, not a biochemical or category-disjointness assertion.
    slots: [id, legacy_relation_id, assertion_type, effect, enforcement, source_selector, target_selector, scope, rationale, evidence, owner, status, review_by]
slots:
  id:
    identifier: true
    required: true
  slug:
    required: true
  label:
    required: true
  description:
  semantic_category:
    required: true
    range: SemanticCategory
  assertion_kind:
    range: SemanticAssertionKind
  allowed_predicates:
    multivalued: true
    required: true
  ontoclean_profile:
    required: true
    range: OntoCleanProfile
  selector_category:
    range: SemanticCategory
  selects_term:
  selects_entity:
  semantic_family:
    range: AssertionSemanticFamily
  source_selector:
  target_selector:
  reason:
  legacy_relation_id:
  assertion_type:
  effect:
  enforcement:
  scope:
  rationale:
  evidence:
    multivalued: true
  owner:
  status:
  review_by:
enums:
  SemanticCategory:
    permissible_values:
      kind:
      role:
      quality:
      effect:
      risk:
      pathway:
      context:
      schedule_rule:
  OntoCleanProfile:
    permissible_values:
      rigid_identity:
      anti_rigid_dependent:
      dependent_assertion:
  SemanticAssertionKind:
    permissible_values:
      clinical_exposure_context:
      ontology_assertion:
      clinical_review_signal:
  AssertionSemanticFamily:
    permissible_values:
      biochemical_mechanism_assertion:
      absorption_interaction_claim:
      nutritional_adequacy_advisory:
      nutrient_balance_review_signal:
      clinical_review_signal:
