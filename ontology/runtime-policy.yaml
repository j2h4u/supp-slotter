id: runtime_policy
protocol:
  condition_classes: [Condition]
  action_classes: [Action]
  gate_classes: [LifecycleGate, PrecedenceRule, TableLookup]
  policy_class: RuntimePolicyCatalog
schedule_axes:
  - {id: axis_planner, axis: planner, values: [slot_policy, audit]}
  - {id: axis_food_model, axis: food_model, values: [binary]}
  - {id: axis_slot_model, axis: slot_model, values: [binary, wake_day_sleep, workout_before_after, wake, breakfast, day_meal, sleep, workout_before, workout_after]}
  - {id: axis_intended_use, axis: intended_use, values: [general]}
  - {id: axis_substrate, axis: substrate, values: [human]}
  - {id: axis_product, axis: product, values: [direct]}
  - {id: axis_formulation, axis: formulation, values: [unknown, capsule, tablet, powder, liquid]}
lifecycle_policies:
  - id: approved
    state: approved
    rank: 3
    executable: true
  - id: review_pending
    state: review_pending
    rank: 2
    executable: true
  - id: retired
    state: retired
    rank: 0
    executable: false
execution_gates:
  - id: approved_execution
    lifecycle_state: approved
    evidence_requirement: required
    executable: true
  - id: review_pending_execution
    lifecycle_state: review_pending
    evidence_requirement: evidence_or_gap
    executable: true
  - id: retired_execution
    lifecycle_state: retired
    evidence_requirement: required
    executable: false
enforcement_policies:
  - id: none
    mode: none
    rank: 0
    executable: false
    effect_role: none
  - id: advisory
    mode: advisory
    rank: 1
    executable: true
    effect_role: warning
  - id: preference
    mode: preference
    rank: 2
    executable: true
    effect_role: scored
  - id: block
    mode: block
    rank: 3
    executable: true
    effect_role: blocking
scope_dimensions:
  - id: planner
    key: planner
    values: [slot_policy, audit]
    rule_ids: [scope_slot_policy]
    default_outcome: mismatch_scope
  - id: food_model
    key: food_model
    values: [binary]
    rule_ids: [scope_binary_food]
    default_outcome: mismatch_scope
  - id: slot_model
    key: slot_model
    values: [binary, wake_day_sleep, workout_before_after, wake, breakfast, day_meal, sleep, workout_before, workout_after]
    rule_ids: [scope_supported_slot_model]
    default_outcome: mismatch_scope
  - id: intended_use
    key: intended_use
    values: [general]
    rule_ids: [scope_general_use]
    default_outcome: mismatch_scope
  - id: substrate
    key: substrate
    values: [human]
    rule_ids: [scope_human_substrate]
    default_outcome: mismatch_scope
  - id: product
    key: product
    values: [direct]
    rule_ids: [scope_direct_product]
    default_outcome: mismatch_scope
  - id: formulation
    key: formulation
    values: [unknown, capsule, tablet, powder, liquid]
    rule_ids: [scope_supported_formulation]
    default_outcome: mismatch_scope
scope_rules:
  - id: scope_slot_policy
    priority: 10
    conditions: [{operator: equals, field: planner, value: slot_policy}]
    outcome: matched_scope
  - id: scope_binary_food
    priority: 10
    conditions: [{operator: equals, field: food_model, value: binary}]
    outcome: matched_scope
  - id: scope_supported_slot_model
    priority: 10
    conditions: [{operator: contains, field: slot_model, value: binary}]
    outcome: matched_scope
  - id: scope_general_use
    priority: 10
    conditions: [{operator: equals, field: intended_use, value: general}]
    outcome: matched_scope
  - id: scope_human_substrate
    priority: 10
    conditions: [{operator: equals, field: substrate, value: human}]
    outcome: matched_scope
  - id: scope_direct_product
    priority: 10
    conditions: [{operator: equals, field: product, value: direct}]
    outcome: matched_scope
  - id: scope_supported_formulation
    priority: 10
    conditions: [{operator: contains, field: formulation, value: capsule}]
    outcome: matched_scope
authorities:
  - id: authority_product_direct
    priority: 10
    conditions: [{operator: equals, field: product, value: direct}]
    authority: product_direct
shadow_rules:
  - id: shadow_secondary
    priority: 10
    conditions: [{operator: is_true, field: shadow}]
    action: shadowed
enforcement_projection:
  - {id: enforcement_none_role, mode: none, effect_role: none}
  - {id: enforcement_advisory_role, mode: advisory, effect_role: warning}
  - {id: enforcement_preference_role, mode: preference, effect_role: scored}
  - {id: enforcement_block_role, mode: block, effect_role: blocking}
effect_remaps:
  - {id: remap_none_prefer_strong, mode: none, level: prefer_strong, block: false, weight: 1, result: prefer_strong}
  - {id: remap_none_prefer, mode: none, level: prefer, block: false, weight: 1, result: prefer}
  - {id: remap_none_avoid, mode: none, level: avoid, block: false, weight: 1, result: avoid}
  - {id: remap_none_avoid_strong, mode: none, level: avoid_strong, block: false, weight: 1, result: avoid_strong}
  - {id: remap_advisory_prefer_strong, mode: advisory, level: prefer_strong, block: false, weight: 1, result: prefer_strong}
  - {id: remap_advisory_prefer, mode: advisory, level: prefer, block: false, weight: 1, result: prefer}
  - {id: remap_advisory_avoid, mode: advisory, level: avoid, block: false, weight: 1, result: avoid}
  - {id: remap_advisory_avoid_strong, mode: advisory, level: avoid_strong, block: false, weight: 1, result: avoid_strong}
  - {id: remap_preference_prefer_strong, mode: preference, level: prefer_strong, block: false, weight: 1, result: prefer_strong}
  - {id: remap_preference_prefer, mode: preference, level: prefer, block: false, weight: 1, result: prefer}
  - {id: remap_preference_avoid, mode: preference, level: avoid, block: false, weight: 1, result: avoid}
  - {id: remap_preference_avoid_strong, mode: preference, level: avoid_strong, block: false, weight: 1, result: avoid_strong}
  - {id: remap_block_prefer_strong, mode: block, level: prefer_strong, block: false, weight: 1, result: prefer_strong}
  - {id: remap_block_prefer, mode: block, level: prefer, block: false, weight: 1, result: prefer}
  - {id: remap_block_avoid, mode: block, level: avoid, block: false, weight: 1, result: avoid}
  - {id: remap_block_avoid_strong, mode: block, level: avoid_strong, block: false, weight: 1, result: avoid_strong}
scope_outcomes:
  - id: matched_scope
    outcome: matched
    rank: 2
    direct_product: required
    formulation: exact_or_unknown
    scope_action: retain_enforcement
    enforcement_cap: block
  - id: limited_scope
    outcome: limited
    rank: 1
    direct_product: required
    formulation: unknown_or_supported
    scope_action: cap_to_advisory
    enforcement_cap: advisory
  - id: mismatch_scope
    outcome: mismatch
    rank: 0
    direct_product: required
    formulation: unsupported
    scope_action: suppress_assignment
    enforcement_cap: none
constraint_governance:
  id: constraint_governance
  evidence_format:
    id: constraint_evidence_format
    scheme: https
    require_host: true
    forbid_userinfo: true
  lifecycle_states:
    - id: proposed
      state: proposed
      rank: 1
      executable: false
    - id: review_pending
      state: review_pending
      rank: 2
      executable: true
    - id: approved
      state: approved
      rank: 3
      executable: true
    - id: retired
      state: retired
      rank: 0
      executable: false
  enforcement_modes:
    - id: constraint_review
      mode: review
      rank: 0
      executable: false
      effect_role: none
    - id: constraint_advisory
      mode: advisory
      rank: 1
      executable: true
      effect_role: warning
    - id: constraint_block
      mode: block
      rank: 2
      executable: true
      effect_role: blocking
  execution_gates:
    - id: constraint_proposed_execution
      lifecycle_state: proposed
      evidence_requirement: prohibited
      executable: false
    - id: constraint_review_pending_execution
      lifecycle_state: review_pending
      evidence_requirement: evidence_or_gap
      executable: true
    - id: constraint_approved_execution
      lifecycle_state: approved
      evidence_requirement: required
      executable: true
    - id: constraint_retired_execution
      lifecycle_state: retired
      evidence_requirement: required
      executable: false
  allowed_pairs:
    - id: proposed_review
      lifecycle_state: proposed
      enforcement_mode: review
    - id: review_pending_review
      lifecycle_state: review_pending
      enforcement_mode: review
    - id: approved_review
      lifecycle_state: approved
      enforcement_mode: review
    - id: approved_advisory
      lifecycle_state: approved
      enforcement_mode: advisory
    - id: approved_block
      lifecycle_state: approved
      enforcement_mode: block
    - id: retired_review
      lifecycle_state: retired
      enforcement_mode: review
assignment_governance:
  id: assignment_governance
  required: true
  required_fields: [status, enforcement_cap, scope, evidence, owner, review_by]
  secondary_enforcement_cap: preference
effect_scoring:
  id: effect_scoring
  scores:
    - id: prefer_strong
      level: prefer_strong
      score: 4
    - id: prefer
      level: prefer
      score: 2
    - id: avoid
      level: avoid
      score: -2
    - id: avoid_strong
      level: avoid_strong
      score: -4
  secondary_component_weight: 0.25
  balance_weight: 0.5
  prefer_with_bonus: 3
  advisory_constraint_score_delta: -1
  advisory_match_direction: symmetric
degradation_rules:
  - id: approved_cap
    lifecycle_state: approved
    maximum_enforcement: block
    secondary_cap: block
    preference_action: retain
    advisory_action: retain
  - id: review_pending_cap
    lifecycle_state: review_pending
    maximum_enforcement: preference
    secondary_cap: preference
    preference_action: cap_to_advisory
    advisory_action: retain
  - id: retired_cap
    lifecycle_state: retired
    maximum_enforcement: none
    secondary_cap: none
    preference_action: suppress
    advisory_action: suppress
constraint_precedence:
  - id: constraint_block
    key: block
    rank: 3
  - id: constraint_preference
    key: preference
    rank: 2
  - id: constraint_advisory
    key: advisory
    rank: 1
  - id: constraint_none
    key: none
    rank: 0
capability_rules:
  - id: slot_planner_binary
    planner: slot_policy
    food_model: binary
    slot_models: [binary, wake_day_sleep, workout_before_after]
    product_scope: [direct]
    formulations: [unknown, capsule, tablet, powder, liquid]
    near_to_model:
      - id: wake_near_model
        near: wake
        model: wake_day_sleep
      - id: breakfast_near_model
        near: breakfast
        model: wake_day_sleep
      - id: day_meal_near_model
        near: day_meal
        model: wake_day_sleep
      - id: sleep_near_model
        near: sleep
        model: wake_day_sleep
      - id: workout_before_near_model
        near: workout_before
        model: workout_before_after
      - id: workout_after_near_model
        near: workout_after
        model: workout_before_after

# Declarative projection contract.  The compiler walks this descriptor tree;
# changing a source or target here changes the executable projection without
# duplicating policy-specific key lists in compiler code.
runtime_projection:
  - id: schedule_axes
    target: schedule_axes
    source: schedule_axes
    emit_table: true
  - id: scope_dimensions_table
    target: scope_dimensions
    source: scope_dimensions
    emit_table: true
  - id: scope_rules
    target: scope_rules
    source: scope_rules
    emit_table: true
  - id: authorities
    target: authorities
    source: authorities
    emit_table: true
  - id: shadow_rules
    target: shadow_rules
    source: shadow_rules
    emit_table: true
  - id: enforcement_projection_table
    target: enforcement_projection
    source: enforcement_projection
    emit_table: true
  - id: effect_remaps
    target: effect_remaps
    source: effect_remaps
    emit_table: true
  - id: lifecycle_projection
    target: lifecycle
    children:
      - id: lifecycle
        target: states
        source: lifecycle_policies
        kind: lifecycle
        emit_table: true
      - id: degradation
        target: degradation
        source: degradation_rules
        kind: degradation
        emit_table: true
  - id: enforcement_projection
    target: enforcement
    children:
      - id: enforcement
        target: modes
        source: enforcement_policies
        kind: enforcement
        emit_table: true
  - id: execution_gates
    target: execution_gates
    source: execution_gates
    kind: execution_gate
    emit_table: true
  - id: constraint_governance_projection
    target: constraint_governance
    children:
      - id: constraint_governance_id
        target: id
        source: constraint_governance.id
      - id: constraint_evidence_format
        target: evidence_format
        source: constraint_governance.evidence_format
      - id: constraint_lifecycle
        target: lifecycle_states
        source: constraint_governance.lifecycle_states
        kind: constraint_lifecycle
        emit_table: true
      - id: constraint_enforcement
        target: enforcement_modes
        source: constraint_governance.enforcement_modes
        kind: constraint_enforcement
        emit_table: true
      - id: constraint_execution_gates
        target: execution_gates
        source: constraint_governance.execution_gates
        kind: constraint_execution_gate
        emit_table: true
      - id: constraint_allowed_pairs
        target: allowed_pairs
        source: constraint_governance.allowed_pairs
        kind: constraint_allowed_pair
        emit_table: true
  - id: scope_outcomes
    target: scope_outcomes
    source: scope_outcomes
    kind: scope_outcome
    emit_table: true
  - id: scope_projection
    target: scope
    children:
      - id: scope_dimensions
        target: dimensions
        source: scope_dimensions
  - id: assignment_projection
    target: assignment_governance
    source: assignment_governance
  - id: scoring_projection
    target: effect_scoring
    children:
      - id: scoring_id
        target: id
        source: effect_scoring.id
      - id: scoring_prefer_with_bonus
        target: prefer_with_bonus
        source: effect_scoring.prefer_with_bonus
      - id: scoring_advisory_constraint_score_delta
        target: advisory_constraint_score_delta
        source: effect_scoring.advisory_constraint_score_delta
      - id: scoring_advisory_match_direction
        target: advisory_match_direction
        source: effect_scoring.advisory_match_direction
      - id: scoring_secondary_component_weight
        target: secondary_component_weight
        source: effect_scoring.secondary_component_weight
      - id: scoring_balance_weight
        target: balance_weight
        source: effect_scoring.balance_weight
      - id: effect_scores
        target: scores
        source: effect_scoring.scores
        kind: effect_score
        emit_table: true
  - id: constraint_precedence
    target: constraint_precedence
    source: constraint_precedence
    kind: precedence
    emit_table: true
  - id: capability_projection
    target: capability_rules
    source: capability_rules
    kind: capability
