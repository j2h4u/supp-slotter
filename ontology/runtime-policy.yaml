id: runtime_policy
protocol:
  condition_classes: [Condition]
  action_classes: [Action]
  gate_classes: [LifecycleGate, PrecedenceRule, TableLookup]
  policy_class: RuntimePolicyCatalog
fact_fields:
  - {id: fact_planner, field: planner, value_type: string}
  - {id: fact_food_model, field: food_model, value_type: string}
  - {id: fact_slot_model, field: slot_model, value_type: string}
  - {id: fact_intended_use, field: intended_use, value_type: string}
  - {id: fact_substrate, field: substrate, value_type: string}
  - {id: fact_product, field: product, value_type: string}
  - {id: fact_formulation, field: formulation, value_type: string}
  - {id: fact_requested_value, field: requested_value, value_type: string}
  - {id: fact_supported_value, field: supported_value, value_type: string}
  - {id: fact_supported_values, field: supported_values, value_type: strings}
  - {id: fact_source_kind, field: source_kind, value_type: string}
  - {id: fact_source_form, field: source_form, value_type: string}
  - {id: fact_scope_kind, field: scope_kind, value_type: string}
  - {id: fact_requested_product_id, field: requested_product_id, value_type: string}
  - {id: fact_actual_product_id, field: actual_product_id, value_type: string}
  - {id: fact_left_authority, field: left_authority, value_type: string}
  - {id: fact_right_authority, field: right_authority, value_type: string}
  - {id: fact_left_source_kind, field: left_source_kind, value_type: string}
  - {id: fact_right_source_kind, field: right_source_kind, value_type: string}
  - {id: fact_left_axis, field: left_axis, value_type: string}
  - {id: fact_right_axis, field: right_axis, value_type: string}
  - {id: fact_left_policy_id, field: left_policy_id, value_type: string}
  - {id: fact_right_policy_id, field: right_policy_id, value_type: string}
  - {id: fact_left_action, field: left_action, value_type: string}
  - {id: fact_right_action, field: right_action, value_type: string}
  - {id: fact_left_executable, field: left_executable, value_type: boolean}
  - {id: fact_right_executable, field: right_executable, value_type: boolean}
  - {id: fact_left_eligible, field: left_eligible, value_type: boolean}
  - {id: fact_right_eligible, field: right_eligible, value_type: boolean}
schedule_axes:
  - {id: axis_planner, axis: planner, values: [slot_policy, audit]}
  - {id: axis_food_model, axis: food_model, values: [binary]}
  - {id: axis_slot_model, axis: slot_model, values: [binary, wake_day_sleep, workout_before_after, wake, breakfast, day_meal, sleep, workout_before, workout_after]}
  - {id: axis_intended_use, axis: intended_use, values: [general]}
  - {id: axis_substrate, axis: substrate, values: [human]}
  - {id: axis_product, axis: product, values: [direct]}
  - {id: axis_formulation, axis: formulation, values: [unknown, capsule, tablet, powder, liquid]}
assignment_axes:
  - {id: assignment_axis_intake, axis: intake, order: 0, assignment_source: schedule, assignment_field: intake}
  - {id: assignment_axis_timing, axis: timing, order: 1, assignment_source: schedule, assignment_field: timing}
  - {id: assignment_axis_activity, axis: activity, order: 2, assignment_source: schedule, assignment_field: activity}
lifecycle_policies:
  - id: approved
    state: approved
    rank: 3
    executable: true
  - id: review_pending
    state: review_pending
    rank: 2
    executable: true
  - id: retired
    state: retired
    rank: 0
    executable: false
execution_gates:
  - id: approved_execution
    lifecycle_state: approved
    evidence_requirement: required
    executable: true
  - id: review_pending_execution
    lifecycle_state: review_pending
    evidence_requirement: evidence_or_gap
    executable: true
  - id: retired_execution
    lifecycle_state: retired
    evidence_requirement: required
    executable: false
enforcement_policies:
  - id: none
    mode: none
    rank: 0
    executable: false
    effect_role: none
  - id: advisory
    mode: advisory
    rank: 1
    executable: true
    effect_role: warning
  - id: preference
    mode: preference
    rank: 2
    executable: true
    effect_role: scored
  - id: block
    mode: block
    rank: 3
    executable: true
    effect_role: blocking
scope_dimensions:
  - id: planner
    key: planner
    values: [slot_policy, audit]
    rule_ids: [scope_slot_policy]
    default_outcome: mismatch_scope
  - id: food_model
    key: food_model
    values: [binary]
    rule_ids: [scope_binary_food]
    default_outcome: mismatch_scope
  - id: slot_model
    key: slot_model
    values: [binary, wake_day_sleep, workout_before_after, wake, breakfast, day_meal, sleep, workout_before, workout_after]
    rule_ids: [scope_supported_slot_model]
    default_outcome: mismatch_scope
  - id: intended_use
    key: intended_use
    values: [general]
    rule_ids: [scope_general_use]
    default_outcome: mismatch_scope
  - id: substrate
    key: substrate
    values: [human]
    rule_ids: [scope_human_substrate]
    default_outcome: mismatch_scope
  - id: product
    key: product
    values: [direct]
    rule_ids: [scope_direct_product]
    default_outcome: mismatch_scope
  - id: formulation
    key: formulation
    values: [unknown, capsule, tablet, powder, liquid]
    rule_ids: [scope_supported_formulation]
    default_outcome: mismatch_scope
scope_rules:
  - id: scope_slot_policy
    priority: 10
    conditions: [{operator: equals_field, field: requested_value, value: supported_value}]
    outcome: matched_scope
  - id: scope_binary_food
    priority: 10
    conditions: [{operator: equals_field, field: requested_value, value: supported_value}]
    outcome: matched_scope
  - id: scope_supported_slot_model
    priority: 10
    conditions: [{operator: member_of_field, field: requested_value, value: supported_values}]
    outcome: matched_scope
  - id: scope_general_use
    priority: 10
    conditions: [{operator: equals_field, field: requested_value, value: supported_value}]
    outcome: limited_scope
  - id: scope_human_substrate
    priority: 10
    conditions: [{operator: equals_field, field: requested_value, value: supported_value}]
    outcome: limited_scope
  - id: scope_direct_product
    priority: 10
    conditions:
      - {operator: equals, field: scope_kind, value: direct}
      - {operator: equals_field, field: requested_product_id, value: actual_product_id}
    outcome: matched_scope
  - id: scope_supported_formulation
    priority: 10
    conditions:
      - {operator: equals_field, field: requested_value, value: source_form}
      - {operator: member_of_field, field: requested_value, value: supported_values}
    outcome: matched_scope
authorities:
  - id: authority_product_direct
    priority: 30
    conditions: [{operator: equals, field: source_kind, value: product}]
    authority: product_direct
    enforcement_cap: block
    score_weight: 1
    control_rank: 3
    action_code: assign_product_direct
    reason_code: authority_product_direct
  - id: authority_component_primary
    priority: 20
    conditions:
      - {operator: equals, field: source_kind, value: component}
      - {operator: equals, field: source_form, value: primary}
    authority: component_primary
    enforcement_cap: block
    score_weight: 1
    control_rank: 2
    action_code: assign_component_primary
    reason_code: authority_component_primary
  - id: authority_component_secondary
    priority: 10
    conditions:
      - {operator: equals, field: source_kind, value: component}
      - {operator: equals, field: source_form, value: secondary}
    authority: component_secondary
    enforcement_cap: preference
    score_weight: 0.25
    control_rank: 1
    action_code: assign_component_secondary
    reason_code: authority_component_secondary
competition_rules:
  - id: product_direct_over_substance_same_axis
    priority: 40
    conditions:
      - {operator: equals, field: left_authority, value: product_direct}
      - {operator: equals, field: right_source_kind, value: substance}
      - {operator: equals_field, field: left_axis, value: right_axis}
    action_code: left_wins
    reason_code: product_direct_defeats_substance_same_axis
  - id: substance_under_product_direct_same_axis
    priority: 30
    conditions:
      - {operator: equals, field: right_authority, value: product_direct}
      - {operator: equals, field: left_source_kind, value: substance}
      - {operator: equals_field, field: right_axis, value: left_axis}
    action_code: right_wins
    reason_code: product_direct_defeats_substance_same_axis
  - id: primary_over_secondary_same_policy_axis
    priority: 20
    conditions:
      - {operator: equals, field: left_authority, value: component_primary}
      - {operator: equals, field: right_authority, value: component_secondary}
      - {operator: equals_field, field: left_policy_id, value: right_policy_id}
      - {operator: equals_field, field: left_axis, value: right_axis}
      - {operator: equals, field: left_action, value: active}
      - {operator: is_true, field: left_executable}
      - {operator: is_true, field: left_eligible}
      - {operator: equals, field: right_action, value: active}
      - {operator: is_true, field: right_executable}
      - {operator: is_true, field: right_eligible}
    action_code: left_wins
    reason_code: component_primary_defeats_secondary_same_policy_axis
  - id: secondary_under_primary_same_policy_axis
    priority: 10
    conditions:
      - {operator: equals, field: right_authority, value: component_primary}
      - {operator: equals, field: left_authority, value: component_secondary}
      - {operator: equals_field, field: right_policy_id, value: left_policy_id}
      - {operator: equals_field, field: right_axis, value: left_axis}
      - {operator: equals, field: right_action, value: active}
      - {operator: is_true, field: right_executable}
      - {operator: is_true, field: right_eligible}
      - {operator: equals, field: left_action, value: active}
      - {operator: is_true, field: left_executable}
      - {operator: is_true, field: left_eligible}
    action_code: right_wins
    reason_code: component_primary_defeats_secondary_same_policy_axis
  - id: unrelated_assignments
    priority: 0
    conditions: []
    action_code: no_action
    reason_code: unrelated_assignments_no_action
enforcement_projection:
  - {id: enforcement_none_role, mode: none, effect_role: none}
  - {id: enforcement_advisory_role, mode: advisory, effect_role: warning}
  - {id: enforcement_preference_role, mode: preference, effect_role: scored}
  - {id: enforcement_block_role, mode: block, effect_role: blocking}
effect_remaps:
  - {id: remap_none_block_only, mode: none, level: null, projected_level: null, score_enabled: false, block_behavior: suppress, level_code: level_suppressed, block_code: block_suppressed, default_code: effect_suppressed}
  - {id: remap_none_prefer_strong, mode: none, level: prefer_strong, projected_level: null, score_enabled: false, block_behavior: suppress, level_code: level_suppressed, block_code: block_suppressed, default_code: effect_suppressed}
  - {id: remap_none_prefer, mode: none, level: prefer, projected_level: null, score_enabled: false, block_behavior: suppress, level_code: level_suppressed, block_code: block_suppressed, default_code: effect_suppressed}
  - {id: remap_none_avoid, mode: none, level: avoid, projected_level: null, score_enabled: false, block_behavior: suppress, level_code: level_suppressed, block_code: block_suppressed, default_code: effect_suppressed}
  - {id: remap_none_avoid_strong, mode: none, level: avoid_strong, projected_level: null, score_enabled: false, block_behavior: suppress, level_code: level_suppressed, block_code: block_suppressed, default_code: effect_suppressed}
  - {id: remap_advisory_block_only, mode: advisory, level: null, projected_level: null, score_enabled: false, block_behavior: suppress, level_code: level_suppressed, block_code: block_suppressed, default_code: advisory_effect}
  - {id: remap_advisory_prefer_strong, mode: advisory, level: prefer_strong, projected_level: null, score_enabled: false, block_behavior: suppress, level_code: level_suppressed, block_code: block_suppressed, default_code: advisory_effect}
  - {id: remap_advisory_prefer, mode: advisory, level: prefer, projected_level: null, score_enabled: false, block_behavior: suppress, level_code: level_suppressed, block_code: block_suppressed, default_code: advisory_effect}
  - {id: remap_advisory_avoid, mode: advisory, level: avoid, projected_level: null, score_enabled: false, block_behavior: suppress, level_code: level_suppressed, block_code: block_suppressed, default_code: advisory_effect}
  - {id: remap_advisory_avoid_strong, mode: advisory, level: avoid_strong, projected_level: null, score_enabled: false, block_behavior: suppress, level_code: level_suppressed, block_code: block_suppressed, default_code: advisory_effect}
  - {id: remap_preference_block_only, mode: preference, level: null, projected_level: null, score_enabled: false, block_behavior: suppress, level_code: level_suppressed, block_code: block_suppressed, default_code: scored_effect}
  - {id: remap_preference_prefer_strong, mode: preference, level: prefer_strong, projected_level: prefer, score_enabled: true, block_behavior: suppress, level_code: level_downgraded, block_code: block_suppressed, default_code: scored_effect}
  - {id: remap_preference_prefer, mode: preference, level: prefer, projected_level: prefer, score_enabled: true, block_behavior: suppress, level_code: level_preserved, block_code: block_suppressed, default_code: scored_effect}
  - {id: remap_preference_avoid, mode: preference, level: avoid, projected_level: avoid, score_enabled: true, block_behavior: suppress, level_code: level_preserved, block_code: block_suppressed, default_code: scored_effect}
  - {id: remap_preference_avoid_strong, mode: preference, level: avoid_strong, projected_level: avoid, score_enabled: true, block_behavior: suppress, level_code: level_downgraded, block_code: block_suppressed, default_code: scored_effect}
  - {id: remap_block_block_only, mode: block, level: null, projected_level: null, score_enabled: false, block_behavior: preserve, level_code: level_preserved, block_code: block_preserved, default_code: blocking_effect}
  - {id: remap_block_prefer_strong, mode: block, level: prefer_strong, projected_level: prefer_strong, score_enabled: true, block_behavior: preserve, level_code: level_preserved, block_code: block_preserved, default_code: blocking_effect}
  - {id: remap_block_prefer, mode: block, level: prefer, projected_level: prefer, score_enabled: true, block_behavior: preserve, level_code: level_preserved, block_code: block_preserved, default_code: blocking_effect}
  - {id: remap_block_avoid, mode: block, level: avoid, projected_level: avoid, score_enabled: true, block_behavior: preserve, level_code: level_preserved, block_code: block_preserved, default_code: blocking_effect}
  - {id: remap_block_avoid_strong, mode: block, level: avoid_strong, projected_level: avoid_strong, score_enabled: true, block_behavior: preserve, level_code: level_preserved, block_code: block_preserved, default_code: blocking_effect}
scope_outcomes:
  - id: matched_scope
    outcome: matched
    rank: 2
    direct_product: required
    formulation: exact_or_unknown
    scope_action: retain_enforcement
    enforcement_cap: block
  - id: limited_scope
    outcome: limited
    rank: 1
    direct_product: required
    formulation: unknown_or_supported
    scope_action: cap_to_advisory
    enforcement_cap: advisory
  - id: mismatch_scope
    outcome: mismatch
    rank: 0
    direct_product: required
    formulation: unsupported
    scope_action: suppress_assignment
    enforcement_cap: none
constraint_governance:
  id: constraint_governance
  evidence_format:
    id: constraint_evidence_format
    scheme: https
    require_host: true
    forbid_userinfo: true
  lifecycle_states:
    - id: proposed
      state: proposed
      rank: 1
      executable: false
    - id: review_pending
      state: review_pending
      rank: 2
      executable: true
    - id: approved
      state: approved
      rank: 3
      executable: true
    - id: retired
      state: retired
      rank: 0
      executable: false
  enforcement_modes:
    - id: constraint_review
      mode: review
      rank: 0
      executable: false
      effect_role: none
    - id: constraint_advisory
      mode: advisory
      rank: 1
      executable: true
      effect_role: warning
    - id: constraint_block
      mode: block
      rank: 2
      executable: true
      effect_role: blocking
  execution_gates:
    - id: constraint_proposed_execution
      lifecycle_state: proposed
      evidence_requirement: prohibited
      executable: false
    - id: constraint_review_pending_execution
      lifecycle_state: review_pending
      evidence_requirement: evidence_or_gap
      executable: true
    - id: constraint_approved_execution
      lifecycle_state: approved
      evidence_requirement: required
      executable: true
    - id: constraint_retired_execution
      lifecycle_state: retired
      evidence_requirement: required
      executable: false
  allowed_pairs:
    - id: proposed_review
      lifecycle_state: proposed
      enforcement_mode: review
    - id: review_pending_review
      lifecycle_state: review_pending
      enforcement_mode: review
    - id: approved_review
      lifecycle_state: approved
      enforcement_mode: review
    - id: approved_advisory
      lifecycle_state: approved
      enforcement_mode: advisory
    - id: approved_block
      lifecycle_state: approved
      enforcement_mode: block
    - id: retired_review
      lifecycle_state: retired
      enforcement_mode: review
assignment_governance:
  id: assignment_governance
  required: true
  required_fields: [status, enforcement_cap, scope, evidence, owner, review_by]
  secondary_enforcement_cap: preference
effect_scoring:
  id: effect_scoring
  scores:
    - id: prefer_strong
      level: prefer_strong
      score: 4
    - id: prefer
      level: prefer
      score: 2
    - id: avoid
      level: avoid
      score: -2
    - id: avoid_strong
      level: avoid_strong
      score: -4
  balance_weight: 0.5
  prefer_with_bonus: 3
  advisory_constraint_score_delta: -1
  advisory_match_direction: symmetric
degradation_rules:
  - {id: approved_none, lifecycle_state: approved, incoming_mode: none, effective_mode: none}
  - {id: approved_advisory, lifecycle_state: approved, incoming_mode: advisory, effective_mode: advisory}
  - {id: approved_preference, lifecycle_state: approved, incoming_mode: preference, effective_mode: preference}
  - {id: approved_block, lifecycle_state: approved, incoming_mode: block, effective_mode: block}
  - {id: review_pending_none, lifecycle_state: review_pending, incoming_mode: none, effective_mode: none}
  - {id: review_pending_advisory, lifecycle_state: review_pending, incoming_mode: advisory, effective_mode: advisory}
  - {id: review_pending_preference, lifecycle_state: review_pending, incoming_mode: preference, effective_mode: advisory}
  - {id: review_pending_block, lifecycle_state: review_pending, incoming_mode: block, effective_mode: preference}
  - {id: retired_none, lifecycle_state: retired, incoming_mode: none, effective_mode: none}
  - {id: retired_advisory, lifecycle_state: retired, incoming_mode: advisory, effective_mode: none}
  - {id: retired_preference, lifecycle_state: retired, incoming_mode: preference, effective_mode: none}
  - {id: retired_block, lifecycle_state: retired, incoming_mode: block, effective_mode: none}
constraint_precedence:
  - id: constraint_block
    key: block
    rank: 3
  - id: constraint_preference
    key: preference
    rank: 2
  - id: constraint_advisory
    key: advisory
    rank: 1
  - id: constraint_none
    key: none
    rank: 0
capability_rules:
  - id: slot_planner_binary
    planner: slot_policy
    food_model: binary
    base_slot_models: [binary]
    slot_models: [binary, wake_day_sleep, workout_before_after]
    product_scope: [direct]
    formulations: [unknown, capsule, tablet, powder, liquid]
    near_to_model:
      - id: wake_near_model
        near: wake
        model: wake_day_sleep
      - id: breakfast_near_model
        near: breakfast
        model: wake_day_sleep
      - id: day_meal_near_model
        near: day_meal
        model: wake_day_sleep
      - id: sleep_near_model
        near: sleep
        model: wake_day_sleep
      - id: workout_before_near_model
        near: workout_before
        model: workout_before_after
      - id: workout_after_near_model
        near: workout_after
        model: workout_before_after

# Declarative projection contract.  The compiler walks this descriptor tree;
# changing a source or target here changes the executable projection without
# duplicating policy-specific key lists in compiler code.
runtime_projection:
  - id: fact_fields
    target: fact_fields
    source: fact_fields
  - id: schedule_axes
    target: schedule_axes
    source: schedule_axes
    emit_table: true
  - id: assignment_axes
    target: assignment_axes
    source: assignment_axes
    emit_table: true
  - id: scope_dimensions_table
    target: scope_dimensions
    source: scope_dimensions
    emit_table: true
  - id: scope_rules
    target: scope_rules
    source: scope_rules
    emit_table: true
  - id: authorities
    target: authorities
    source: authorities
    emit_table: true
  - id: competition_rules
    target: competition_rules
    source: competition_rules
    emit_table: true
  - id: enforcement_projection_table
    target: enforcement_projection
    source: enforcement_projection
    emit_table: true
  - id: effect_remaps
    target: effect_remaps
    source: effect_remaps
    emit_table: true
  - id: lifecycle_projection
    target: lifecycle
    children:
      - id: lifecycle
        target: states
        source: lifecycle_policies
        kind: lifecycle
        emit_table: true
      - id: degradation
        target: degradation
        source: degradation_rules
        kind: degradation
        emit_table: true
  - id: enforcement_projection
    target: enforcement
    children:
      - id: enforcement
        target: modes
        source: enforcement_policies
        kind: enforcement
        emit_table: true
  - id: execution_gates
    target: execution_gates
    source: execution_gates
    kind: execution_gate
    emit_table: true
  - id: constraint_governance_projection
    target: constraint_governance
    children:
      - id: constraint_governance_id
        target: id
        source: constraint_governance.id
      - id: constraint_evidence_format
        target: evidence_format
        source: constraint_governance.evidence_format
      - id: constraint_lifecycle
        target: lifecycle_states
        source: constraint_governance.lifecycle_states
        kind: constraint_lifecycle
        emit_table: true
      - id: constraint_enforcement
        target: enforcement_modes
        source: constraint_governance.enforcement_modes
        kind: constraint_enforcement
        emit_table: true
      - id: constraint_execution_gates
        target: execution_gates
        source: constraint_governance.execution_gates
        kind: constraint_execution_gate
        emit_table: true
      - id: constraint_allowed_pairs
        target: allowed_pairs
        source: constraint_governance.allowed_pairs
        kind: constraint_allowed_pair
        emit_table: true
  - id: scope_outcomes
    target: scope_outcomes
    source: scope_outcomes
    kind: scope_outcome
    emit_table: true
  - id: scope_projection
    target: scope
    children:
      - id: scope_dimensions
        target: dimensions
        source: scope_dimensions
  - id: assignment_projection
    target: assignment_governance
    source: assignment_governance
  - id: scoring_projection
    target: effect_scoring
    children:
      - id: scoring_id
        target: id
        source: effect_scoring.id
      - id: scoring_prefer_with_bonus
        target: prefer_with_bonus
        source: effect_scoring.prefer_with_bonus
      - id: scoring_advisory_constraint_score_delta
        target: advisory_constraint_score_delta
        source: effect_scoring.advisory_constraint_score_delta
      - id: scoring_advisory_match_direction
        target: advisory_match_direction
        source: effect_scoring.advisory_match_direction
      - id: scoring_balance_weight
        target: balance_weight
        source: effect_scoring.balance_weight
      - id: effect_scores
        target: scores
        source: effect_scoring.scores
        kind: effect_score
        emit_table: true
  - id: constraint_precedence
    target: constraint_precedence
    source: constraint_precedence
    kind: precedence
    emit_table: true
  - id: capability_projection
    target: capability_rules
    source: capability_rules
    kind: capability
