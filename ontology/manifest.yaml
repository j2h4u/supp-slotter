schema_version: "1"
base_iri: https://j2h4u.github.io/supp-slotter/ontology/v1/
linkml_root: supp_slotter.yaml
linkml_modules:
  - supp_slotter.yaml
  - model.yaml
  - vocabulary.yaml
  - relations.yaml
  - ontoclean.yaml
policy_sources:
  - policies.yaml
constraint_sources:
  - scheduling-constraints.yaml
assertion_sources:
  # The current planner consumes this same canonical source directly.  Its
  # generated projection is a contract artifact, not a second source of truth.
  - ../data/relations.yaml
custom_shapes:
  - constraints/semantic.ttl
runtime_vocabulary_format: supp-slotter.runtime-vocabulary/v1
