slot_policy_evidence:
  operational.policy_contract:
    kind: operational_contract
    ref: tests/test_canonical_scheduling_policies.py
    title: Canonical policy contract tests
    supports: Planner behavior contract.
    limitations: Does not establish clinical efficacy.
  operational.food_required_contract:
    kind: operational_contract
    ref: tests/test_primary_component_scoring.py
    title: Food-required planner contract
    supports: Exact binary food policy behavior.
    limitations: Only approved scoped assignments may use block.
  intake.E01:
    kind: authoritative_instruction
    url: https://ods.od.nih.gov/factsheets/VitaminD-HealthProfessional/
    title: NIH ODS Vitamin D fact sheet
    supports: Dietary fat improves vitamin D absorption, while some vitamin D is absorbed
      without dietary fat.
    limitations: Supports a food preference for applicable forms, not an empty-slot
      block or universal requirement.
  intake.E02:
    kind: authoritative_instruction
    url: https://ods.od.nih.gov/factsheets/VitaminE-HealthProfessional/
    title: NIH ODS Vitamin E fact sheet
    supports: Vitamin E absorption depends on intestinal fat digestion, and water-soluble
      forms are used in malabsorption contexts.
    limitations: Formulation matters; this does not establish a universal binary-food
      hard requirement.
  intake.E03:
    kind: authoritative_instruction
    url: https://ods.od.nih.gov/factsheets/VitaminK-HealthProfessional/
    title: NIH ODS Vitamin K fact sheet
    supports: Vitamin K uses micelles, bile, and lipid transport, and supplement forms
      are absorbed.
    limitations: Comparative bioavailability data are limited and do not establish
      a fasting prohibition.
  intake.E04:
    kind: authoritative_instruction
    url: https://ods.od.nih.gov/factsheets/VitaminA-HealthProfessional/
    title: NIH ODS Vitamin A and Carotenoids fact sheet
    supports: Vitamin A and carotenoids are fat-soluble and absorption depends on
      form and food context.
    limitations: Does not establish a universal prohibition on fasting intake.
  intake.E05:
    kind: primary_human
    url: https://pubmed.ncbi.nlm.nih.gov/17666877/
    title: Human crossover pharmacokinetic study of food and CoQ10
    supports: Food increased CoQ10 absorption in the studied formulation.
    limitations: Supports preference, not a universal food requirement or block.
  intake.E06:
    kind: primary_human
    url: https://pubmed.ncbi.nlm.nih.gov/33011737/
    title: Randomized omega-3 formulation pharmacokinetic study
    supports: Meal effects on omega-3 absorption depend on ester and delivery formulation.
    limitations: Food is a coarse proxy; fasting absorption can differ by formulation.
  intake.E07:
    kind: authoritative_instruction
    url: https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=966b815d-1d78-4b54-8f00-c5a0b67c78be
    title: DailyMed efavirenz label
    supports: Efavirenz is instructed on an empty stomach because food can increase
      concentrations and adverse reactions.
    limitations: Applies to the labeled drug and does not create a generic substance-class
      rule.
  intake.E09:
    kind: authoritative_instruction
    url: https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=0ff1ba75-3c86-4baf-a6b1-1bb883839866
    title: DailyMed metformin IR and ER label
    supports: Immediate-release metformin is taken with meals and extended-release
      with the evening meal.
    limitations: Formulation-specific instructions cannot be represented as an unconditional
      product-agnostic block.
  intake.E10:
    kind: authoritative_instruction
    url: https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=d596ac59-b643-4181-80ba-f2db1cc3459c
    title: DailyMed sulfasalazine delayed-release label
    supports: The label states that sulfasalazine is preferably taken after meals.
    limitations: Supports a preference, not a hard food requirement.
  intake.E14:
    kind: regulatory_context
    url: https://www.fda.gov/media/81606/download
    title: FDA plant sterol and stanol health-claim framework
    supports: The framework couples specified amounts and forms with two meals.
    limitations: Amount and form are not represented by an abstract binary food value.
  intake.E16:
    kind: regulatory_context
    url: https://www.fda.gov/food/dietary-supplements/information-consumers-using-dietary-supplements
    title: FDA information for consumers using dietary supplements
    supports: Supplement labels and marketing are not preapproved evidence of universal
      safety or effectiveness.
    limitations: A product label cannot automatically promote a form-specific direction
      into a universal ontology fact.
  intake.E17:
    kind: authoritative_instruction
    url: https://ods.od.nih.gov/factsheets/Iron-HealthProfessional/
    title: NIH ODS Iron fact sheet
    supports: Food can reduce gastrointestinal effects of supplemental iron.
    limitations: Dose, formulation, and interactions matter; this supports preference
      rather than requirement.
  intake.E18:
    kind: authoritative_instruction
    url: https://ods.od.nih.gov/factsheets/Magnesium-HealthProfessional/
    title: NIH ODS Magnesium and Zinc fact sheets
    supports: Gastrointestinal effects and interactions for mineral supplements depend
      on dose and form.
    limitations: Mineral category alone does not determine one meal rule.
  intake.E19:
    kind: authoritative_instruction
    url: https://ods.od.nih.gov/factsheets/Niacin-HealthProfessional/
    title: NIH ODS Niacin fact sheet
    supports: Food can reduce nicotinic-acid flushing.
    limitations: The effect depends on niacin form and dose.
  intake.E20:
    kind: regulatory_context
    url: https://www.efsa.europa.eu/en/press/news/180418
    title: EFSA safety assessment of green tea catechins
    supports: Concentrated extract and fasting context affect EGCG safety review.
    limitations: Supports a food advisory for applicable extracts, not a blanket botanical
      rule.
  intake.E21:
    kind: systematic_review
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC6723188/
    title: Alpha-lipoic acid review with human pharmacokinetic synthesis
    supports: Human evidence supports a plausible fasting preference for alpha-lipoic
      acid.
    limitations: Bioavailability is low and variable and depends on formulation, so
      no hard block is justified.
  enzyme.E1:
    kind: authoritative_instruction
    url: https://www.niddk.nih.gov/health-information/digestive-diseases/lactose-intolerance/treatment
    title: NIDDK treatment for lactose intolerance
    supports: Lactase tablets are taken before milk products and drops may be added
      to milk.
    limitations: The substrate is lactose-containing food, not generic food:true;
      this is not an all-food hard block.
  enzyme.E2:
    kind: authoritative_instruction
    url: https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=073201aa-556d-4a70-918e-84e9616fd88d
    title: DailyMed CREON pancrelipase label
    supports: The specific delayed-release pancrelipase product is taken during meals
      and snacks.
    limitations: Product-, formulation-, and indication-specific; it cannot be generalized
      to every OTC pancreatin or enzyme.
  enzyme.E3:
    kind: primary_human
    url: https://pubmed.ncbi.nlm.nih.gov/25287168/
    title: Randomized crossover study of acid-resistant lipase
    supports: The studied lipase was administered immediately before a high-fat meal
      and reduced fullness.
    limitations: Small formulation-specific study with no fed-versus-fasted comparison.
  enzyme.E4:
    kind: primary_human
    url: https://pubmed.ncbi.nlm.nih.gov/41662956/
    title: Randomized crossover multienzyme meal study
    supports: A blend containing proteases, lipase, amylase, and glucoamylase was
      co-ingested with a mixed meal.
    limitations: Blend and surrogate outcomes support digestive-use context, not a
      hard universal timing rule.
  enzyme.E5:
    kind: primary_human
    url: https://pubmed.ncbi.nlm.nih.gov/23709455/
    title: Nattokinase human pharmacokinetic pilot
    supports: Oral nattokinase-related immunoreactivity was measured after a single
      dose.
    limitations: Small pilot with unknown bioavailability and no fed-versus-fasted
      comparison; it does not support empty_preferred.
  enzyme.E6:
    kind: primary_human
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC4479826/
    title: Nattokinase single-dose randomized crossover study
    supports: A single oral dose changed selected coagulation and fibrinolysis markers
      in healthy participants.
    limitations: Small acute biomarker study with no fed-versus-fasted comparison
      or clinical outcome.
  enzyme.E8:
    kind: authoritative_instruction
    url: https://www.nccih.nih.gov/health/bromelain/
    title: NCCIH bromelain usefulness and safety
    supports: Bromelain is proteolytic and oral evidence is limited; mixture studies
      are difficult to attribute.
    limitations: Does not establish fed-versus-fasted systemic use or empty-stomach
      superiority.
  enzyme.E9:
    kind: regulatory_context
    url: https://www.efsa.europa.eu/en/efsajournal/pub/9950
    title: EFSA papain food-enzyme safety evaluation
    supports: Papain is a proteolytic cysteine endopeptidase complex and allergenicity
      is relevant.
    limitations: Food-enzyme safety evidence is not oral supplement efficacy, timing,
      systemic action, or antiplatelet evidence.
  circadian.caffeine_sleep_meta:
    kind: systematic_review
    url: https://pubmed.ncbi.nlm.nih.gov/28919842/
    title: ISSN nutrient timing position stand
    supports: Caffeine is a wake-promoting stimulant and timing can affect sleep.
    limitations: Dose, interval, genetics, pregnancy, medicines, and habitual use
      are not modeled; no universal cutoff or block.
  circadian.melatonin:
    kind: systematic_review
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC4582061/
    title: AASM circadian rhythm sleep-wake disorder guideline
    supports: Melatonin supports a sleep and circadian intent preference.
    limitations: Timing relative to circadian phase matters; this is not a universal
      chronic-insomnia treatment rule.
  circadian.glycine:
    kind: systematic_review
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC10828290/
    title: Systematic review of glycine and sleep
    supports: Small short studies support a possible sleep-associated preference.
    limitations: Studied dose and timing are not equivalent to unknown formulations
      or amounts.
  circadian.magnesium_glycinate:
    kind: systematic_review
    url: https://pubmed.ncbi.nlm.nih.gov/33865376/
    title: Systematic review of magnesium supplementation and sleep
    supports: Magnesium supplementation has a heterogeneous sleep signal.
    limitations: Population, deficiency, form, and elemental dose vary; no universal
      bedtime rule is established.
  workout.creatine:
    kind: systematic_review
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC8401986/
    title: Review of creatine timing
    supports: Creatine is workout-associated but pre- versus post-workout superiority
      is not established.
    limitations: Supports equal before/after preference, not an acute timing requirement.
  workout.lclt:
    kind: systematic_review
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC9736198/
    title: Review of L-carnitine L-tartrate recovery evidence
    supports: L-carnitine L-tartrate has a weak workout and recovery association.
    limitations: Evidence generally uses multiweek daily protocols rather than acute
      pre/post timing.
  workout.citrulline:
    kind: systematic_review
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC8571142/
    title: Critical review of citrulline malate exercise evidence
    supports: Some trials support a soft pre-workout context.
    limitations: Outcomes, dose, formulation, and citrulline-malate ratio are heterogeneous.
  workout.betaine_nitrate:
    kind: systematic_review
    url: https://pmc.ncbi.nlm.nih.gov/articles/PMC8516348/
    title: Review of dietary nitrate and exercise
    supports: Nitrate timing can support a pre-workout preference when the nitrate
      dose is known.
    limitations: The card does not state actual nitrate mmol or mg; standardization
      and protocol are not modeled.
