    applies_when: Use only for an explicit governed assignment that permits equal preference for either observable workout slot.
    effects:
    - match:
        near: workout_before
      level: prefer
    - match:
        near: workout_after
      level: prefer
    status: approved
    enforcement: preference
    scope:
      planner: slot_policy
      slot_model: binary
    evidence:
    - source: operational.policy_contract
      supports: Canonical planner behavior.
      limitations: Assignment evidence controls applicability.
    owner: supp-slotter-maintainers
    review_by: '2026-10-13'
  activity:post_workout:
