version: 2

updates:
  # Python deps managed by uv — reads pyproject.toml + uv.lock and regenerates
  # the lock in the PR. Must be the "uv" ecosystem, NOT "pip" (pip leaves
  # uv.lock out of sync and breaks CI). This is what surfaces a new surrealdb
  # SDK release — i.e. how the 3.x engine eventually reaches us.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:17"
      timezone: "Asia/Almaty"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Minor + patch bumps batched into one low-risk PR. Major bumps stay
      # ungrouped, so each gets its own PR — a surrealdb 2.x -> 3.x jump lands
      # as a standalone, easy-to-spot PR.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Keep workflow actions current (low noise, security-relevant).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:17"
      timezone: "Asia/Almaty"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
