# Dependabot configuration — version updates.
# Security updates and vulnerability alerts are enabled at the repo level
# (Settings → Code security) once this repo is on GitHub.
version: 2
updates:
  # Python dependencies — uv ecosystem reads pyproject.toml + uv.lock.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Asia/Almaty"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      python-minor-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      python-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  # GitHub Actions pinned in .github/workflows/*.yml.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Asia/Almaty"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      github-actions:
        applies-to: "version-updates"
        patterns:
          - "*"
      github-actions-security:
        applies-to: "security-updates"
        patterns:
          - "*"
