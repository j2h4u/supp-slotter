name: Dependency review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Dependency review
        uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
