# Pharmacological effect registry used by review and dashboards.
effect:
  alertness_context:
    label: Alertness Context
    description: Alertness and wakefulness context for substances that increase
      arousal, vigilance, or short-term focus.
    applies_when: Use when alertness is a practical review target; pair with
      stimulant_context when sympathetic or stimulant load also matters.
  amino_acid_metabolism_support:
    label: Amino Acid Metabolism Support
    description: Amino-acid metabolism support context for vitamins or cofactors
      that participate in transamination, decarboxylation, or amino-acid turnover.
    applies_when: Use for nutrient cofactors that affect amino-acid handling;
      use essential_amino_acid_context for amino acids themselves.
  androgen_context:
    label: Androgen Context
    description: Androgen or androgen-adjacent endocrine review context, especially
      for prostate, hair, libido, or hormone-sensitive use cases.
    applies_when: Use when androgen signaling, DHT-adjacent positioning, or
      hormone-sensitive review is part of the practical rationale.
  anti_catabolic_context:
    label: Anti Catabolic Context
    description: Anti-catabolic context for substances positioned to reduce muscle
      protein breakdown or preserve lean tissue during training stress.
    applies_when: Use when muscle preservation, recovery, or anti-catabolic
      positioning is the practical reason for review.
  anti_inflammatory_context:
    label: Anti Inflammatory Context
    description: Inflammation-modulating review context, including botanicals or
      nutrients with anti-inflammatory signaling, pain, or tissue-irritation relevance.
    applies_when: Use for substances whose primary practical review includes
      inflammation, soreness, or inflammatory joint/vascular load; do not use as
      a generic antioxidant synonym.
  antioxidant_context:
    label: Antioxidant Context
    description: Broad antioxidant-effect context for substances with relevant
      oxidative-stress, radical-scavenging, or antioxidant-network claims.
    applies_when: Use when antioxidant activity is a practical review reason;
      prefer narrower effects like lipid_antioxidant_support or
      redox_metabolism_support when those better explain the role.
  antioxidant_enzyme_cofactor:
    label: Antioxidant Enzyme Cofactor
    description: Cofactor context for endogenous antioxidant enzymes such as
      superoxide dismutase, glutathione peroxidase, or related redox enzymes.
    applies_when: Use for minerals or nutrients that support antioxidant enzyme
      systems; do not use for generic radical-scavenging compounds.
  appetite_context:
    label: Appetite Context
    description: Appetite, satiety, or food-intake review context.
    applies_when: Use when the substance is selected or reviewed for appetite
      modulation, weight-control support, or satiety-related claims.
  b_complex_matrix_context:
    label: B Complex Matrix Context
    description: B-complex matrix context for substances that appear as part of a
      broader B-vitamin or inositol-related nutrient pattern.
    applies_when: Use when the relevant review is B-complex adjacency or formula
      context rather than a standalone single-vitamin effect.
  bile_acid_conjugation_context:
    label: Bile Acid Conjugation Context
    description: Bile-acid conjugation context for substances involved in bile
      acid handling or conjugation support.
    applies_when: Use when gallbladder, bile flow, fat digestion, or bile-acid
      metabolism is part of the rationale.
  blood_clotting_context:
    label: Blood Clotting Context
    description: Coagulation or vitamin-K/calcium-related clotting review context,
      distinct from antiplatelet or fibrinolytic effects.
    applies_when: Use for substances that materially participate in clotting
      biology or require coagulation review; pair with bleeding-load risks when
      relevant.
  blood_pressure_context:
    label: Blood Pressure Context
    description: Blood-pressure-relevant effect context, including vascular tone,
      fluid balance, or antihypertensive-adjacent pathways.
    applies_when: Use when a substance can materially affect blood-pressure review
      or should be considered in hypotensive/hypertensive load discussions.
  bone_mineral_metabolism_support:
    label: Bone Mineral Metabolism Support
    description: Bone and mineral-metabolism support axis spanning calcium,
      magnesium, phosphorus, vitamin D/K, boron, strontium, and related cofactors.
    applies_when: Use for substances that affect bone matrix, mineral balance,
      mineral absorption, or bone turnover review; not for generic mineral status
      alone.
  bowel_regularity_context:
    label: Bowel Regularity Context
    description: Bowel-regularity context for fibers or gut supports selected for
      stool frequency, stool form, or transit regularity.
    applies_when: Use when constipation, regularity, fiber tolerance, or bowel
      habit support is part of the practical review.
  calcium_absorption_support:
    label: Calcium Absorption Support
    description: Calcium absorption support context for substances that improve
      intestinal calcium uptake or calcium handling.
    applies_when: Use when calcium absorption or calcium sufficiency depends on
      the substance; pair with bone_mineral_metabolism_support when relevant.
  calming_context:
    label: Calming Context
    description: Calming or anxiolytic-adjacent effect context for substances used
      to reduce arousal, stress reactivity, or nervous-system excitability.
    applies_when: Use when the practical reason is calming, relaxation, or evening
      downshift; separate from direct sleep-onset timing.
  capillary_support_context:
    label: Capillary Support Context
    description: Microvascular and capillary support context, usually from flavonoid
      or polyphenol effects on capillary fragility or vascular integrity.
    applies_when: Use for substances selected for capillary, bruise, venous, or
      microvascular support; not for generic vascular health alone.
  carbohydrate_digestion_support:
    label: Carbohydrate Digestion Support
    description: Carbohydrate-digestion support context for enzymes or compounds
      acting on starches and other carbohydrates in the gut.
    applies_when: Use when the intended role is carbohydrate breakdown or digestive
      tolerance around carbohydrate-containing meals.
  carboxylase_cofactor:
    label: Carboxylase Cofactor
    description: Carboxylase-enzyme cofactor context, most commonly biotin-related
      metabolism of fats, carbohydrates, and amino acids.
    applies_when: Use for substances whose practical role is supporting
      carboxylase-dependent metabolism rather than broad nutrient support.
  carnosine_buffer_context:
    label: Carnosine Buffer Context
    description: Carnosine-buffer context for beta-alanine or related supports
      that raise muscle carnosine and buffering capacity.
    applies_when: Use when high-intensity exercise buffering, lactate-associated
      tolerance, or carnosine support is the practical target.
  cartilage_matrix_context:
    label: Cartilage Matrix Context
    description: Cartilage matrix support context for structural joint compounds
      involved in cartilage composition, resilience, or turnover.
    applies_when: Use for glucosamine, chondroitin, and similar joint-matrix
      substrates; do not use for general anti-inflammatory joint support alone.
  catecholamine_precursor_context:
    label: Catecholamine Precursor Context
    description: Catecholamine-precursor context for substances that supply or
      support dopamine, norepinephrine, or epinephrine synthesis.
    applies_when: Use when focus, stress performance, or stimulant-adjacent review
      depends on catecholamine precursor status.
  cell_signaling_context:
    label: Cell Signaling Context
    description: Cell-signaling context for substances involved in intracellular
      second-messenger, membrane-signaling, or phosphoinositide-related roles.
    applies_when: Use only when signaling biology is a concrete review reason;
      prefer narrower metabolic effects when available.
  cellular_function_support:
    label: Cellular Function Support
    description: Broad cellular-function support context for foundational vitamins
      or cofactors whose value is not captured by a narrower pathway.
    applies_when: Use sparingly when the practical rationale is general cellular
      cofactor coverage; prefer narrower metabolic or pathway effects when known.
  cholinergic_support:
    label: Cholinergic Support
    description: Supports acetylcholine availability, signaling, or cholinergic
      cognitive context.
    applies_when: Use for choline donors, acetylcholinesterase inhibitors, or
      substances where cholinergic load should be reviewed.
  circulation_support:
    label: Circulation Support
    description: General circulation-support context for substances selected for
      blood flow, peripheral circulation, or vascular perfusion.
    applies_when: Use when circulation is the practical review target and no
      narrower vascular tone, endothelial, or blood-pressure effect explains it.
  cognitive_performance_context:
    label: Cognitive Performance Context
    description: Cognitive performance context covering focus, mental stamina,
      recall, or task-performance positioning.
    applies_when: Use when cognitive performance is a practical selection reason;
      prefer narrower alertness, memory, cholinergic, or neurotrophic effects
      when those are the actual reason.
  collagen_matrix_support:
    label: Collagen Matrix Support
    description: Collagen matrix support context for amino acids, vitamin C-related
      cofactors, or nutrients involved in collagen structure and repair.
    applies_when: Use when collagen formation, connective tissue, skin structure,
      tendon/ligament support, or wound repair is part of the rationale.
  connective_tissue_matrix_context:
    label: Connective Tissue Matrix Context
    description: Connective-tissue matrix context spanning collagen, elastin,
      glycosaminoglycans, and structural mineral support.
    applies_when: Use for substances selected for skin, joint, tendon, ligament,
      or matrix support when a narrower matrix effect is insufficient.
  connective_tissue_synthesis_support:
    label: Connective Tissue Synthesis Support
    description: Connective-tissue synthesis support context for cofactors involved
      in forming or maintaining collagen, elastin, or extracellular matrix.
    applies_when: Use when synthesis or repair of connective tissue is the reason,
      not merely joint comfort or skin appearance.
  cyp_modulation_context:
    label: CYP Modulation Context
    description: Cytochrome P450 modulation context for substances that may alter
      medication or xenobiotic metabolism.
    applies_when: Use when CYP-mediated interaction review is relevant; pair with
      medication-specific risks when the affected drug class is known.
  digestive_comfort_context:
    label: Digestive Comfort Context
    description: Digestive-comfort context for substances selected around nausea,
      bloating, motility discomfort, or meal tolerance.
    applies_when: Use when gastrointestinal comfort is a practical review target;
      use digestive_enzyme_context for direct enzyme activity.
  digestive_enzyme_context:
    label: Digestive Enzyme Context
    description: Digestive enzyme activity context for enzymes intended to act on
      food substrates in the gut.
    applies_when: Use for amylase, lipase, papain, bromelain, or similar digestive
      enzymes; do not use for systemic enzymes such as nattokinase.
  diuretic_context:
    label: Diuretic Context
    description: Diuretic or urinary-fluid context for substances that may increase
      urine output or alter fluid handling.
    applies_when: Use when fluid balance, urinary frequency, electrolyte review,
      or diuretic-adjacent positioning is relevant.
  dna_synthesis_support:
    label: DNA Synthesis Support
    description: Nucleotide synthesis and cell-replication support context, commonly
      tied to folate, B12, zinc, and methylation-related cofactors.
    applies_when: Use when DNA synthesis, rapidly dividing tissues, pregnancy-adjacent
      review, or deficiency correction is a practical reason.
  electrolyte_adjacent_context:
    label: Electrolyte Adjacent Context
    description: Electrolyte-adjacent context for non-electrolyte substances that
      influence fluid balance, osmolality, or electrolyte handling.
    applies_when: Use when electrolyte review is relevant but the substance is not
      itself a primary sodium, potassium, magnesium, calcium, or chloride source.
  electron_transport_support:
    label: Electron Transport Support
    description: Mitochondrial electron-transport support context for cofactors
      involved in respiratory-chain electron transfer.
    applies_when: Use for CoQ10-like or flavin-related roles in electron transport;
      keep separate from generic energy or stimulant effects.
  endothelial_context:
    label: Endothelial Context
    description: Endothelial-function context for vascular substances affecting
      nitric oxide signaling, vascular tone, or endothelial resilience.
    applies_when: Use when endothelial health is a practical review target; pair
      with blood-pressure or vasodilator effects when clinically relevant.
  endurance_context:
    label: Endurance Context
    description: Endurance context for substances selected for sustained aerobic
      output, time to fatigue, or exercise capacity.
    applies_when: Use when endurance is the practical target; use fatigue_resilience
      or mitochondrial effects when those are the narrower rationale.
  energy_context:
    label: Energy Context
    description: Perceived-energy or vitality context, distinct from ATP-pathway
      nutrient support and from direct stimulant effects.
    applies_when: Use when product positioning or review rationale is energy
      perception, fatigue, or vitality; prefer energy_production_support for
      cellular ATP cofactors.
  energy_production_support:
    label: Energy Production Support
    description: Cellular energy-production support context for B vitamins, minerals,
      mitochondrial cofactors, and substrates involved in ATP production.
    applies_when: Use when a substance supports ATP production, mitochondrial energy
      pathways, or fatigue-related nutrient coverage; not for stimulant effects.
  epithelial_immune_context:
    label: Epithelial Immune Context
    description: Epithelial and mucosal immune-support context for nutrients that
      affect barrier tissues and immune-facing surfaces.
    applies_when: Use when skin, mucosa, respiratory, gut, or epithelial barrier
      immunity is part of the practical rationale.
  essential_amino_acid_context:
    label: Essential Amino Acid Context
    description: Essential amino acid status context for amino acids that must come
      from diet or supplementation.
    applies_when: Use for individual essential amino acids or blends where essential
      amino acid coverage is itself relevant; pair with protein synthesis effects
      when appropriate.
  exercise_performance_context:
    label: Exercise Performance Context
    description: Exercise-performance context for substances selected for training
      output, power, endurance, or workout tolerance.
    applies_when: Use when exercise performance is the practical review target;
      use narrower pump, recovery, phosphocreatine, or buffering effects when
      they explain the role.
  exercise_pump_context:
    label: Exercise Pump Context
    description: Exercise-pump context for substances that support workout blood
      flow, nitric-oxide-linked pump, or muscle fullness during training.
    applies_when: Use when pump or acute training blood flow is the target; review
      alongside vasodilator and blood-pressure context when relevant.
  exercise_recovery_support:
    label: Exercise Recovery Support
    description: Exercise-recovery support context for substances selected to
      improve post-training recovery, soreness, or readiness.
    applies_when: Use when recovery after training is the practical review target;
      use narrower muscle_recovery or anti_catabolic effects when applicable.
  fat_digestion_support:
    label: Fat Digestion Support
    description: Fat-digestion support context for enzymes or bile-adjacent factors
      involved in breaking down dietary fats.
    applies_when: Use when the intended role is lipid digestion or meal tolerance
      around fat-containing meals.
  fatigue_resilience_context:
    label: Fatigue Resilience Context
    description: Fatigue-resilience context for adaptogens or performance supports
      intended to delay perceived fatigue or improve stress tolerance.
    applies_when: Use when fatigue resistance, sustained effort, or stress-linked
      stamina is part of the selection rationale.
  fatty_acid_metabolism_support:
    label: Fatty Acid Metabolism Support
    description: Supports fatty-acid synthesis, transport, oxidation, or related
      cofactor-dependent lipid metabolism.
    applies_when: Use when the substance is a direct cofactor, substrate, or
      functional support for fatty-acid metabolism rather than a generic fat source.
  fibrinolytic:
    label: Fibrinolytic
    description: Promotes fibrin breakdown or fibrinolytic activity, creating
      bleeding-load review context.
    applies_when: Use for nattokinase-like fibrinolytic substances; do not use
      for generic cardiovascular support without fibrinolytic activity.
  fluid_balance_context:
    label: Fluid Balance Context
    description: Fluid-balance context for substances that affect hydration,
      extracellular fluid, osmotic balance, or water retention.
    applies_when: Use when hydration, edema, electrolyte distribution, or fluid
      handling is a practical review target.
  focus_relaxation_context:
    label: Focus Relaxation Context
    description: Focus-with-relaxation context for substances positioned around
      calm attention rather than sedation or stimulation.
    applies_when: Use when the practical goal is relaxed focus, anxiety-free
      attention, or smoothing stimulant-like arousal.
  glucose_metabolism_context:
    label: Glucose Metabolism Context
    description: Glucose, insulin, or carbohydrate-metabolism review context.
    applies_when: Use when a substance may affect glycemic control, insulin
      signaling, or glucose-medication review; not for generic energy support.
  gastric_acid_suppression_context:
    label: Gastric Acid Suppression Context
    description: Gastric-acid-suppression medication context where reduced stomach
      acid can affect food-bound nutrient absorption or GI medication review.
    applies_when: Use for proton pump inhibitors and H2-receptor antagonists
      where B12 or other acid-dependent absorption context should be reviewed.
  glutathione_precursor_support:
    label: Glutathione Precursor Support
    description: Glutathione-precursor support context for substances that supply
      cysteine or otherwise support glutathione synthesis capacity.
    applies_when: Use when glutathione synthesis, antioxidant network support, or
      cysteine availability is the practical reason.
  glycosaminoglycan_context:
    label: Glycosaminoglycan Context
    description: Glycosaminoglycan and joint-matrix context for structural compounds
      involved in cartilage, synovial fluid, or connective-tissue hydration.
    applies_when: Use for glucosamine, chondroitin, hyaluronic acid, and similar
      matrix substrates; not for unrelated joint-comfort botanicals.
  gut_barrier_context:
    label: Gut Barrier Context
    description: Gut-barrier context for substances selected for intestinal lining,
      permeability, mucosal integrity, or gut repair support.
    applies_when: Use when the practical target is gut epithelial integrity rather
      than microbiome ecology or digestive enzyme activity.
  gut_microbiome_context:
    label: Gut Microbiome Context
    description: Gut microbiome context for probiotics, prebiotic fibers, or
      compounds selected for microbial ecology support.
    applies_when: Use when microbiome composition, probiotic exposure, prebiotic
      substrate, or gut-ecology review is part of the rationale.
  homocysteine_metabolism_support:
    label: Homocysteine Metabolism Support
    description: Homocysteine and one-carbon metabolism support context, usually
      tied to folate, B12, B6, betaine, or related cofactors.
    applies_when: Use when lowering or normalizing homocysteine, methylation
      throughput, or cardiovascular methylation review is part of the rationale.
  hormone_vitamin_d_context:
    label: Hormone Vitamin D Context
    description: Vitamin-D and hormone-adjacent context for substances that affect
      vitamin D status, steroid-hormone review, or endocrine mineral balance.
    applies_when: Use when vitamin D endocrine biology or hormone-adjacent review
      is a practical reason; pair with bone-mineral context when relevant.
  hpa_axis_context:
    label: HPA Axis Context
    description: HPA-axis review context for substances positioned around cortisol,
      stress response, or neuroendocrine stress adaptation.
    applies_when: Use when hypothalamic-pituitary-adrenal stress signaling is part
      of the rationale; keep separate from generic calming or sleep effects.
  incretin_context:
    label: Incretin Context
    description: GLP-1, GIP, or related incretin-drug review context spanning
      satiety, gastric-emptying, glucose, and weight-management pharmacology.
    applies_when: Use for prescription or investigational incretin-mimetic drugs
      such as semaglutide, tirzepatide, liraglutide, dulaglutide, exenatide, and
      retatrutide; keep supplement glucose or appetite claims on their narrower
      effects instead.
  immune_cell_context:
    label: Immune Cell Context
    description: Immune-cell context for substances that support lymphocytes,
      macrophages, neutrophils, or other immune-cell activity.
    applies_when: Use when immune-cell fuel, proliferation, function, or recovery
      is the practical review target.
  immune_function_support:
    label: Immune Function Support
    description: Supports normal immune function through nutrient status,
      antioxidant protection, barrier function, or immune-cell function.
    applies_when: Use when immune function is a meaningful review reason for the
      substance; avoid as a generic wellness tag.
  immune_modulation_context:
    label: Immune Modulation Context
    description: Immune-modulation context for botanicals, mushrooms, or nutrients
      that may alter immune tone rather than simply fill deficiency.
    applies_when: Use when the relevant question is immune balance, activation,
      suppression, or modulation; use immune_function_support for basic immune
      nutrient coverage.
  insulin_signaling_context:
    label: Insulin Signaling Context
    description: Insulin-signaling context for substances that affect insulin
      sensitivity, insulin receptor signaling, or glucose-disposal signaling.
    applies_when: Use when insulin signaling is the practical target; pair with
      glucose_metabolism_context for glycemic review.
  iron_metabolism_support:
    label: Iron Metabolism Support
    description: Iron-metabolism support context for cofactors involved in iron
      transport, utilization, or incorporation into blood proteins.
    applies_when: Use when iron handling, anemia-adjacent review, or hematinic
      cofactor support is the practical reason.
  joint_comfort_context:
    label: Joint Comfort Context
    description: Joint-comfort effect context covering pain, stiffness, inflammation,
      lubrication, or connective-tissue support relevant to joints.
    applies_when: Use when a substance is selected for joint comfort or mobility;
      use narrower effects too when matrix, lubrication, or inflammation is the
      specific reason.
  joint_lubrication_context:
    label: Joint Lubrication Context
    description: Joint-lubrication context for substances related to synovial fluid,
      membrane lipids, or connective-tissue hydration.
    applies_when: Use when the practical target is lubrication, stiffness, or joint
      glide rather than inflammation or cartilage matrix alone.
  learning_context:
    label: Learning Context
    description: Learning-support context for substances selected around learning,
      acquisition, or training-related cognitive adaptation.
    applies_when: Use when learning capacity or learning-performance review is the
      practical target; use memory_recall_context for retrieval-focused claims.
  leucine_metabolite_context:
    label: Leucine Metabolite Context
    description: Leucine-metabolite context for HICA or related compounds derived
      from leucine metabolism.
    applies_when: Use when the substance's role depends on leucine-metabolite
      identity rather than generic amino-acid or protein-synthesis coverage.
  lipid_antioxidant_support:
    label: Lipid Antioxidant Support
    description: Lipid-phase antioxidant support context for protecting membranes,
      lipoproteins, or polyunsaturated fatty acids from oxidation.
    applies_when: Use for vitamin E, CoQ10, and related lipid-soluble antioxidants;
      do not use as a generic antioxidant synonym.
  lipid_membrane_context:
    label: Lipid Membrane Context
    description: Lipid-membrane context for substances that contribute to membrane
      lipids, membrane fluidity, or lipid structural support.
    applies_when: Use when membrane lipid composition or structural lipid support
      is a practical review reason.
  lipid_metabolism_support:
    label: Lipid Metabolism Support
    description: Lipid-metabolism support context for substances that materially
      affect lipid synthesis, clearance, or cholesterol-related pathways.
    applies_when: Use when cholesterol, triglyceride, or lipid-pathway review is
      the practical rationale.
  longevity_context:
    label: Longevity Context
    description: Longevity-context axis for substances selected around aging biology,
      lifespan-positioning, or healthspan claims.
    applies_when: Use only when longevity positioning is a practical review target;
      prefer specific pathways such as redox or mitochondrial support when known.
  memory_recall_context:
    label: Memory Recall Context
    description: Memory-recall context for substances selected around retrieval,
      retention, or memory performance.
    applies_when: Use when memory recall is the practical target; use learning_context
      for acquisition-focused claims.
  mild_stimulant_context:
    label: Mild Stimulant Context
    description: Mild-stimulant context for substances with stimulant-like effects
      that are weaker or smoother than caffeine-like stimulant load.
    applies_when: Use when stimulant-adjacent review is relevant but the expected
      arousal is modest; pair with alertness or vascular tone when applicable.
  mitochondrial_biogenesis_context:
    label: Mitochondrial Biogenesis Context
    description: Mitochondrial-biogenesis context for substances selected around
      mitochondrial renewal, density, or signaling that supports new mitochondria.
    applies_when: Use when mitochondrial biogenesis is the practical rationale;
      keep separate from generic energy-production support.
  mitochondrial_fatty_acid_transport:
    label: Mitochondrial Fatty Acid Transport
    description: Mitochondrial fatty-acid transport context, especially carnitine
      shuttle support for moving long-chain fatty acids into mitochondria.
    applies_when: Use when fatty-acid oxidation or carnitine-shuttle support is
      the practical reason; keep separate from generic energy support.
  mitochondrial_redox_cofactor:
    label: Mitochondrial Redox Cofactor
    description: Mitochondrial redox cofactor context for compounds involved in
      mitochondrial oxidative metabolism and redox cycling.
    applies_when: Use when mitochondrial redox handling is the reason for review;
      pair with redox_metabolism_support when the broader network matters.
  mucolytic_context:
    label: Mucolytic Context
    description: Mucolytic context for substances selected to thin mucus, support
      airway clearance, or reduce mucus viscosity.
    applies_when: Use when respiratory mucus handling is the practical review
      target; do not use for generic antioxidant support.
  muscle_protein_synthesis_context:
    label: Muscle Protein Synthesis Context
    description: Muscle-protein-synthesis context for substances that specifically
      support anabolic muscle signaling or muscle tissue protein formation.
    applies_when: Use when the target is muscle protein synthesis rather than
      generic protein synthesis or amino-acid coverage.
  muscle_recovery_context:
    label: Muscle Recovery Context
    description: Muscle-recovery context for substances selected around soreness,
      repair, training adaptation, or recovery between workouts.
    applies_when: Use when muscle-specific recovery is the practical target; use
      exercise_recovery_support for broader training recovery.
  nad_precursor_support:
    label: NAD Precursor Support
    description: NAD-precursor support context for substances that supply precursors
      used in NAD+ biosynthesis or NAD-related metabolism.
    applies_when: Use when NAD status, mitochondrial metabolism, or cellular energy
      signaling is the practical review target.
  neuromuscular_function_support:
    label: Neuromuscular Function Support
    description: Neuromuscular-function support axis covering mineral and electrolyte
      roles in contraction, relaxation, cramps, and nerve signaling.
    applies_when: Use for minerals and electrolytes that materially affect
      neuromuscular function; not for generic exercise performance.
  nervous_system_support:
    label: Nervous System Support
    description: Nervous-system support context for nutrients required for nerve
      maintenance, myelin, neurotransmission, or neurologic deficiency correction.
    applies_when: Use when nervous-system coverage is a practical reason and no
      narrower neurocognitive, neurotransmitter, or neuromuscular effect fits.
  neurocognitive_context:
    label: Neurocognitive Context
    description: Neurocognitive context for substances selected around cognition,
      brain function, mental performance, or neurologic support.
    applies_when: Use when the target is broad neurocognitive support and no
      narrower alertness, memory, cholinergic, or neurotrophic axis fits.
  neurotransmitter_synthesis_support:
    label: Neurotransmitter Synthesis Support
    description: Neurotransmitter synthesis support context for cofactors involved
      in producing monoamines, GABA, acetylcholine, or related transmitters.
    applies_when: Use when precursor or cofactor support for neurotransmitter
      synthesis is part of the rationale; keep separate from direct receptor load.
  neurotrophic_support:
    label: Neurotrophic Support
    description: Neurotrophic-support context for substances positioned around
      nerve growth factor, neuronal maintenance, or neuroplasticity support.
    applies_when: Use when neurotrophic or neuroplasticity support is the practical
      rationale; keep separate from generic nootropic classification.
  nitrate_context:
    label: Nitrate Context
    description: Nitrate context for substances whose vascular or exercise role
      depends on nitrate/nitrite/nitric-oxide biology.
    applies_when: Use when nitrate-related NO support or dietary nitrate context
      is the practical rationale.
  nitric_oxide_support:
    label: Nitric Oxide Support
    description: Nitric-oxide support context for direct substrates or nitrate
      donors that increase practical NO availability or NO-linked vascular signaling.
    applies_when: Use for citrulline, arginine or AAKG, and nitrate donors when
      NO signaling is the practical target; do not use for generic endothelial,
      antioxidant, methylation, or vascular-wellness context alone.
  nitrogen_metabolism_context:
    label: Nitrogen Metabolism Context
    description: Nitrogen-metabolism context for amino acids or compounds involved
      in nitrogen transport, disposal, or amino-nitrogen balance.
    applies_when: Use when nitrogen handling is the practical reason; prefer
      amino_acid_metabolism_support when the focus is cofactor support.
  nutrient_metabolism_support:
    label: Nutrient Metabolism Support
    description: General nutrient-metabolism support context for cofactors that
      help convert, activate, or use nutrients.
    applies_when: Use sparingly when the effect is real but not captured by a
      narrower vitamin, mineral, energy, or pathway-specific axis.
  ocular_retina_context:
    label: Ocular Retina Context
    description: Ocular and retinal support context, especially macular carotenoids
      and berry/polyphenol support for eye-health review.
    applies_when: Use when the practical review target is retina, macula, visual
      function, or eye-health support.
  osmolyte_context:
    label: Osmolyte Context
    description: Osmolyte context for substances that influence cell hydration,
      osmotic balance, or compatible-solute behavior.
    applies_when: Use when osmolality, cell-volume support, hydration tolerance,
      or electrolyte-adjacent balance is the practical review target.
  oxygen_transport_support:
    label: Oxygen Transport Support
    description: Oxygen-transport support context for iron and red-cell related
      nutrients affecting hemoglobin or oxygen-carrying capacity.
    applies_when: Use when oxygen transport, anemia-adjacent review, or endurance
      limitation from hematinic status is part of the rationale.
  paresthesia_tolerance_context:
    label: Paresthesia Tolerance Context
    description: Paresthesia-tolerance context for substances whose useful dose may
      be limited by tingling or sensory side effects.
    applies_when: Use when paresthesia is a practical tolerance or dose-splitting
      consideration.
  pde5_inhibition:
    label: PDE5 Inhibition
    description: Inhibits phosphodiesterase type 5, increasing cGMP-mediated
      smooth-muscle relaxation and vasodilatory context.
    applies_when: Use for PDE5 inhibitors such as tadalafil; review with nitrates,
      alpha-blockers, antihypertensives, alcohol, or other vasodilators.
  phosphocreatine_support:
    label: Phosphocreatine Support
    description: Phosphocreatine-system support context for substances that improve
      rapid ATP buffering and high-intensity energy availability.
    applies_when: Use when phosphocreatine, strength, sprint output, or repeated
      high-intensity work is the practical target.
  phospholipid_membrane_context:
    label: Phospholipid Membrane Context
    description: Phospholipid-membrane context for substances involved in membrane
      phospholipids, phospholipid delivery, or structural membrane support.
    applies_when: Use when phospholipid form or membrane structure is part of the
      practical review.
  platelet_aggregation_modulation:
    label: Platelet Aggregation Modulation
    description: Modulates platelet aggregation or platelet-related bleeding-load
      context.
    applies_when: Use for substances with antiplatelet or platelet-modulating
      signal; review with anticoagulant/antiplatelet drugs and surgery context.
  polyphenol_context:
    label: Polyphenol Context
    description: Polyphenol context for plant compounds selected around flavonoid,
      phenolic, or berry/tea/polyphenol activity.
    applies_when: Use when polyphenol identity is a practical review reason; use
      vascular_polyphenol_context when vascular support is the narrower target.
  prostate_urinary_context:
    label: Prostate Urinary Context
    description: Prostate and lower-urinary-tract context for substances selected
      for urinary flow, frequency, or benign-prostate-support positioning.
    applies_when: Use when prostate/urinary support is a practical review target;
      pair with androgen_context when DHT-adjacent rationale is relevant.
  reproductive_hormone_context:
    label: Reproductive Hormone Context
    description: Reproductive and hormone-adjacent review context for menopause,
      menstrual-cycle, PMS, fertility, libido, or hormone-sensitive use cases.
    applies_when: Use when a substance is selected or reviewed for reproductive
      hormone modulation or hormone-associated symptoms; pair with androgen_context
      or prostate_urinary_context when the rationale is androgen-specific.
  protein_digestion_support:
    label: Protein Digestion Support
    description: Protein-digestion support context for proteolytic enzymes intended
      to break down dietary protein in the gut.
    applies_when: Use for proteases such as bromelain or papain when digestive
      protein breakdown is the intended role.
  protein_synthesis_support:
    label: Protein Synthesis Support
    description: Protein-synthesis support context for amino acids, cofactors, or
      nutrients that contribute to tissue protein formation across tissues.
    applies_when: Use when broad protein synthesis or tissue-building coverage is
      the practical target; use muscle_protein_synthesis_context for muscle-specific
      anabolic signaling.
  purine_metabolism_context:
    label: Purine Metabolism Context
    description: Purine-metabolism context for substances involved in purine
      breakdown, uric-acid-adjacent review, or molybdenum-dependent metabolism.
    applies_when: Use when purine handling, uric-acid context, or related enzyme
      support is the practical reason.
  red_blood_cell_support:
    label: Red Blood Cell Support
    description: Red blood cell and hematologic support context, including iron,
      folate, B12, and related erythropoiesis cofactors.
    applies_when: Use when anemia, oxygen-carrying capacity, red-cell formation,
      or hematinic coverage is part of the review.
  redox_metabolism_support:
    label: Redox Metabolism Support
    description: Redox metabolism support context for substances involved in cellular
      electron transfer, antioxidant recycling, NAD/NADH, or glutathione-adjacent
      balance.
    applies_when: Use when the reason is redox cycling, oxidative metabolism, or
      antioxidant-network support rather than broad antioxidant labeling.
  skin_barrier_context:
    label: Skin Barrier Context
    description: Skin-barrier and epithelial-support context for nutrients that
      affect epidermal integrity, wound resilience, or skin structure.
    applies_when: Use when skin barrier, hair/nail/skin structure, acne-adjacent
      nutrient review, or epithelial integrity is part of the rationale.
  skin_matrix_context:
    label: Skin Matrix Context
    description: Skin-matrix context for substances selected around dermal structure,
      collagen, sulfur matrix, or connective-tissue support in skin.
    applies_when: Use when skin structural matrix is the practical target; use
      skin_barrier_context for epithelial barrier integrity.
  sleep_context:
    label: Sleep Context
    description: Sleep-support context for substances that affect sleep quality,
      sleep continuity, calming at bedtime, or circadian timing.
    applies_when: Use when sleep is a practical review target; use sleep_onset_support
      when the narrower issue is timing or onset.
  sleep_onset_support:
    label: Sleep Onset Support
    description: Supports sleep onset or circadian sleep timing without implying a
      generic sedative effect.
    applies_when: Use for melatonin-like substances where the review question is
      sleep onset, jet lag, delayed sleep phase, or bedtime timing.
  stimulant_context:
    label: Stimulant Context
    description: Stimulant-load context for substances that increase arousal,
      sympathetic tone, or stimulant-like activation.
    applies_when: Use when stimulant exposure, timing, tolerance, sleep impact, or
      stacking with other stimulants should be reviewed.
  stress_performance_context:
    label: Stress Performance Context
    description: Stress-performance context for substances selected to maintain
      focus, drive, or output during acute stress.
    applies_when: Use when performance under stress is the practical target; keep
      separate from calming and sleep effects.
  stress_reactivity_context:
    label: Stress Reactivity Context
    description: Stress-reactivity context for substances that may change emotional,
      physiologic, or cognitive response to stressors.
    applies_when: Use when reactivity to stress is the practical review target;
      use stress_resilience_context for broader adaptation.
  stress_resilience_context:
    label: Stress Resilience Context
    description: Stress-resilience and adaptogen context for substances used to
      modulate perceived stress, HPA-axis tone, fatigue resilience, or stress
      performance.
    applies_when: Use when stress adaptation or resilience is a primary rationale;
      do not use as a generic botanical wellness tag.
  sulfur_amino_acid_metabolism:
    label: Sulfur Amino Acid Metabolism
    description: Sulfur amino-acid metabolism context for cysteine, methionine,
      taurine, molybdenum-linked sulfur handling, or glutathione-adjacent flow.
    applies_when: Use when sulfur amino-acid handling or sulfite/sulfate metabolism
      is a practical review reason.
  sulfur_connective_tissue_context:
    label: Sulfur Connective Tissue Context
    description: Sulfur connective-tissue context for sulfur donors or sulfur-rich
      compounds used for connective tissue, cartilage, or skin matrix support.
    applies_when: Use when sulfur contribution to connective tissue is the practical
      rationale; pair with skin or joint matrix effects when relevant.
  urinary_adhesion_context:
    label: Urinary Adhesion Context
    description: Urinary-adhesion context for substances selected to reduce
      bacterial adhesion to urinary tract surfaces.
    applies_when: Use when anti-adhesion urinary support is the practical target,
      not for generic diuretic or urinary-flow support.
  urinary_tract_context:
    label: Urinary Tract Context
    description: Urinary-tract support context for substances selected around
      bladder, urethral, or urinary-system health.
    applies_when: Use when urinary tract support is the practical review target;
      use urinary_adhesion_context for bacterial anti-adhesion specificity.
  vascular_calcification_context:
    label: Vascular Calcification Context
    description: Vascular calcification review context for calcium trafficking,
      vitamin K-dependent carboxylation, and mineral deposition concerns.
    applies_when: Use when the substance affects calcium placement, arterial
      calcification review, or the vitamin D/K/calcium balance.
  vascular_polyphenol_context:
    label: Vascular Polyphenol Context
    description: Polyphenol-linked vascular support context covering endothelial
      tone, vascular resilience, and circulation-related antioxidant effects.
    applies_when: Use for flavonoids, berry extracts, tea polyphenols, and similar
      compounds selected for vascular health; pair with blood_pressure_context or
      capillary_support_context when the narrower concern applies.
  vascular_tone_context:
    label: Vascular Tone Context
    description: Vascular-tone context for substances that may alter vessel
      relaxation, constriction, or smooth-muscle signaling.
    applies_when: Use when circulation, blood-pressure tendency, or vasodilatory
      load is a practical review concern.
  vasodilator:
    label: Vasodilator
    description: Promotes vascular smooth-muscle relaxation or vasodilatory
      signaling.
    applies_when: Use for substances with direct vasodilatory relevance; review
      alongside hypotension, PDE5, nitrate, and blood-pressure contexts.
  vision_retinoid_support:
    label: Vision Retinoid Support
    description: Vision and retinoid-cycle support context for vitamin A forms or
      provitamin A compounds involved in visual pigment function.
    applies_when: Use when retinoid biology, night vision, or vitamin-A-dependent
      visual support is part of the rationale.
  weight_metabolic_context:
    label: Weight Metabolic Context
    description: Weight-management and metabolic-context axis for substances
      positioned around body weight, metabolic rate, or adiposity support.
    applies_when: Use when weight or metabolic positioning is the practical review
      target; keep separate from glucose-specific and appetite-specific effects.
  wound_healing_support:
    label: Wound Healing Support
    description: Supports wound-healing biology such as collagen formation,
      epithelial repair, immune function, or zinc-dependent repair processes.
    applies_when: Use when wound healing or tissue repair is a specific review
      reason, not as a generic skin-health tag.
