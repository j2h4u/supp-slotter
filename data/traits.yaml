# =============================================================================
# data/traits.yaml — Substance trait definitions and scheduling rules
# =============================================================================
#
# Traits are the bridge between substance biology and slot assignment. Each
# substance card carries trait IDs in up to six namespaces. The planner reads
# these traits, looks up their rules here, and scores each substance against
# each candidate slot.
#
# NAMESPACES
# ----------
# intake:     Absorption and food-interaction rules. How and when to take it.
#             Examples: intake:empty_preferred, intake:fat_meal_required
#
# timing:     Scheduling-relevant timing class: energy_like, sleep_disruptive,
#             sleep_support — drives near/sleep slot rules.
#             Examples: timing:energy_like, timing:sleep_support
#
# risk:       Safety or interaction flags. Traits with warning: true emit a
#             schedule warning for every substance that carries them.
#             Examples: risk:manual_review, risk:stimulant
#
# activity:   Training-context specificity. Substances with activity: traits MUST
#             be assigned to a stack whose pillbox has workout_* near slots.
#             The planner hard-rejects plans that violate this.
#             Examples: activity:pre_workout, activity:post_workout
#
# is:         Structural/category classification. Used for editorial grouping.
#             No direct slot-scoring effect.
#             Examples: is:fat_soluble, is:botanical, is:enzyme
#
# context:    Curated review-context membership. Used by dashboard yaml files via from_traits
#             only when no cleaner is/effect/risk/pathway projection preserves membership.
#             These traits have NO scheduling effects; they only control which
#             review clusters a substance belongs to.
#
# pathway:    Reviewer-only metabolic pathway membership. Not used by Planner
#             scheduling; surfaced by the Reviewer layer for informational grouping.
#             Note: pharmacological effect annotation (e.g. vasodilator, sedating)
#             lives under knowledge.effect: on substance cards and is NOT part of
#             traits.yaml.
#
# TRAIT FIELDS
# ------------
# label         Short display name (shown in planner output).
# description   Full explanation. Shown in warnings when warning: true.
# applies_when  Editorial guidance: when to assign this trait to a substance card.
# effects       List of slot-scoring rules (see EFFECTS below). Optional.
# warning       true = emit a schedule warning for every substance carrying this
#               trait, regardless of slot assignment. Use for traits that need
#               human review but cannot be expressed as a slot constraint.
# action        Recommendation shown alongside the warning when warning: true.
#
# EFFECTS
# -------
# Each effect has a match: block and either a level: or block: true field.
#
# match.near    Timing anchor to match (see pillboxes.yaml > SLOT FIELDS > near).
#               Omit to match on food state only.
# match.food    true/false to match food state. Omit to match on near only.
#
# level         Scoring preference. Evaluated strongest-to-weakest:
#                 prefer_strong  — strong pull toward this slot
#                 prefer         — mild pull toward this slot
#                 avoid          — mild push away (reduces score but does not block)
#                 avoid_strong   — strong push away (reduces score but does not block)
#
# block: true   Hard block. The planner will NOT assign the substance to any slot
#               that matches this rule, regardless of score.
#
# =============================================================================

intake:
  empty_preferred:
    label: Prefers empty stomach
    description: Works or absorbs better away from food, without a hard food block.
    applies_when: Use for amino acids, enzymes, or fast-absorption tablets where food
      reduces but does not eliminate usefulness.
    effects:
    - match:
        food: false
      level: prefer_strong
    - match:
        food: true
      level: avoid
  fat_meal_required:
    label: Requires fat-containing meal
    description: Fat-containing food is the real intake target; current slot model
      approximates this as food=true.
    applies_when: Use for fat-soluble vitamins and carotenoids where dietary fat materially
      improves absorption.
    effects:
    - match:
        food: true
      level: prefer_strong
    - match:
        food: false
      block: true
  food_neutral:
    label: Food neutral
    description: Food state is not a meaningful scheduling driver.
    applies_when: Use when prior empty-stomach or food folklore is too strong for
      the actual evidence.
  food_preferred:
    label: Prefers food
    description: Food improves tolerance or practical use, but empty-stomach intake
      remains acceptable.
    applies_when: Use for B-complex, minerals, and products where food mainly reduces
      nausea or irritation.
    effects:
    - match:
        food: true
      level: prefer
  food_required:
    label: Requires food
    description: Active substance requires food for absorption, stomach tolerance,
      or reliable effect.
    applies_when: Use for substances where taking without food is materially worse;
      use intake:food_preferred for softer tolerance preferences.
    effects:
    - match:
        food: true
      level: prefer_strong
    - match:
        food: false
      block: true
timing:
  energy_like:
    label: Energy-like
    description: Direct wake-promoting or activating effect.
    applies_when: Use for documented activating substances, not general wellness or
      B-vitamin folklore.
    effects:
    - match:
        near: wake
      level: prefer_strong
    - match:
        near: day_meal
      level: prefer
    - match:
        near: sleep
      level: avoid_strong
  sleep_disruptive:
    label: Sleep disruptive
    description: Likely to disrupt sleep and should not be placed near bedtime.
    applies_when: Use for substances with strong wake-promoting or sleep-disruptive
      evidence.
    effects:
    - match:
        near: sleep
      block: true
  sleep_support:
    label: Sleep support
    description: Directly supports sleep onset or sleep quality.
    applies_when: Use for sleep-targeted substances such as glycine or magnesium glycinate.
    effects:
    - match:
        near: sleep
      level: prefer_strong
is:
  adaptogen:
    label: Adaptogen
    description: Plant-derived substance that supports stress resilience and homeostatic
      regulation via HPA-axis or related pathways.
    applies_when: Use for Ashwagandha, Rhodiola, Holy Basil, Bacopa, Cordyceps, Panax
      ginseng, and similar stress-modulating botanicals with clinical adaptogen evidence.
  antioxidant:
    label: Antioxidant
    description: Substance with direct free-radical scavenging or antioxidant-pathway
      support as a primary function.
    applies_when: Use for NAC, quercetin, resveratrol, dihydroquercetin, lipoic acid,
      L-ergothioneine, and similar direct antioxidants. Fat-soluble antioxidants such
      as CoQ10 or astaxanthin may carry both fat_soluble and antioxidant.
  electrolyte:
    label: Electrolyte
    description: Electrolyte marker for physiological electrolyte ions and supplement
      forms that supply sodium, potassium, magnesium, calcium, chloride, or similar
      electrolyte context.
    applies_when: Use for base electrolyte ions and mineral salt/chelate forms where
      electrolyte balance review is relevant. This marks review relevance, not dose
      magnitude or elemental contribution.
  ergogenic:
    label: Ergogenic
    description: Substance with evidence for performance, strength, endurance, or
      exercise-recovery enhancement as a primary positioning.
    applies_when: Use for creatine, L-carnitine, L-citrulline, HICA, beta-alanine,
      L-arginine, and similar workout-performance substances.
  fat_soluble:
    label: Fat-soluble
    description: Fat-soluble nutrient or carotenoid.
    applies_when: Use for vitamins A, D, E, K and fat-soluble carotenoids or oils.
  mineral:
    label: Mineral
    description: Mineral marker; concrete scheduling comes from intake and competition
      traits.
    applies_when: Use for Mg, Ca, Fe, Zn, K, Cu, Se, I, and related minerals.
  nootropic:
    label: Nootropic
    description: Substance with evidence for cognitive support, memory, focus, or
      neuroprotection as a primary positioning.
    applies_when: Use for Alpha-GPC, Lion's Mane, Ginkgo, Huperzia serrata, DMAE,
      and similar cognitive-support substances. Adaptogens with strong cognitive evidence
      such as Bacopa may carry both adaptogen and nootropic.
  omega3:
    label: Omega-3
    description: Long-chain omega-3 fatty acid (EPA or DHA) or a direct whole-source
      that delivers EPA/DHA.
    applies_when: Use for EPA, DHA, and krill oil. Not for ALA-only sources such as
      flaxseed, which are fat_soluble but not omega3.
  amino:
    label: Amino acid
    description: Amino acid or close structural analogue (including non-proteinogenic
      and conditionally essential forms).
    applies_when: Use for L-Arg, L-Lys, L-Orn, L-Cit, Glycine, Beta-alanine,
      L-Glutamine, L-Theanine, L-Ergothioneine, Taurine, and similar amino-acid
      compounds. Polyhierarchical — may co-occur with ergogenic or antioxidant.
  carotenoid:
    label: Carotenoid
    description: Carotenoid pigment — fat-soluble antioxidant from the tetraterpene
      family, including xanthophylls and carotenes.
    applies_when: Use for Astaxanthin, Lutein, Lycopene, Zeaxanthin, Beta-carotene,
      and similar carotenoid pigments. May co-occur with fat_soluble and antioxidant.
  flavonoid:
    label: Flavonoid
    description: Polyphenol from the flavonoid family (flavonols, flavones, flavanols,
      anthocyanins, flavanones, isoflavones).
    applies_when: Use for Quercetin, Hesperidin, Rutin, Dihydroquercetin, Bilberry,
      Grape extract, Green tea extract, Citrus bioflavonoids, and similar flavonoid
      sources. May co-occur with antioxidant.
  fiber:
    label: Dietary fiber
    description: Dietary fiber or polysaccharide-based fiber supplement.
    applies_when: Use for psyllium, inulin, seed fiber blends, and similar dietary
      fiber sources. Not for mushroom beta-glucans used as bioactivity markers.
  vitamin:
    label: Vitamin
    description: Vitamin — essential organic micronutrient required in trace amounts
      that the body cannot synthesize in sufficient quantity.
    applies_when: Use for all B-vitamin forms (B1–B12). Vitamins A, C, D, E, K
      may carry both vitamin and a more specific classifier (fat_soluble, antioxidant).
  enzyme:
    label: Enzyme
    description: Proteolytic, lipolytic, or other digestive/systemic enzyme.
    applies_when: Use for Bromelain, Papain, Nattokinase, Lipase, Alpha amylase,
      and similar enzyme substances.
  botanical:
    label: Botanical
    description: Whole plant, herb, or botanical extract without a more specific
      classifier (not adaptogen, not flavonoid, not carotenoid).
    applies_when: Use for Garlic, Ginger, Turmeric, Boswellia, Valerian,
      Passionflower, Lavender, Lemon balm, Saw palmetto, Stinging nettle,
      and similar herbs. Adaptogens and flavonoid-rich extracts may carry
      a more specific trait instead or alongside.
  pharmaceutical:
    label: Pharmaceutical
    description: Prescription or OTC pharmaceutical drug (not a supplement).
    applies_when: Use for Metformin, Efavirenz, Methotrexate, Tadalafil,
      Omeprazole, Lansoprazole, Ranitidine, Cimetidine, Midazolam,
      Sulfasalazine, Levodopa, and similar drugs in the stack.
risk:
  b6_neuropathy_long_term:
    label: B6 neuropathy long-term
    description: Long-term supplemental pyridoxine exposure can cause sensory
      peripheral neuropathy; review cumulative B6 intake across products.
    applies_when: Use for pyridoxine HCl/pyridoxine supplement forms when chronic
      intake should be reviewed separately from active P5P forms.
    warning: true
    action: Review cumulative daily pyridoxine HCl/B6 intake across active products.
  bleeding_med_interaction:
    label: Bleeding medication interaction
    description: Fibrinolytic, antiplatelet, anticoagulant, or omega-3 context where
      medication, surgery, or stacked bleeding-load review matters.
    applies_when: Use for nattokinase, high-signal omega-3 sources, antiplatelet
      botanicals, and other substances where anticoagulant/antiplatelet context should
      be reviewed.
    warning: true
  hyperkalemia_med_interaction:
    label: Hyperkalemia medication interaction
    description: Potassium-related medication interaction risk.
    applies_when: Use for potassium-containing substances or formulas where ACEi,
      ARB, NSAID, or K-sparing diuretic context matters.
    warning: true
  hypotension_med_interaction:
    label: Hypotension medication interaction
    description: Vasodilator or blood-pressure-lowering context where nitrates,
      alpha-blockers, antihypertensives, PDE5 inhibitors, or symptomatic hypotension
      should be reviewed.
    applies_when: Use for PDE5 inhibitors, nitric-oxide precursors, and direct
      vasodilator substances where additive hypotension is the practical concern.
    warning: true
  serotonergic_med_interaction:
    label: Serotonergic medication interaction
    description: Serotonin-precursor, serotonergic-modulating, SSRI/SNRI/MAOI, or
      stacked 5-HT context where medication or cumulative serotonergic-load review matters.
    applies_when: Use for 5-HTP and botanicals/adaptogens with documented or review-relevant
      serotonergic modulation where antidepressant or serotonin-syndrome-like context should
      be reviewed.
    warning: true
  manual_review:
    label: Requires manual review
    description: Generic safety or interaction marker for items needing operator attention.
    applies_when: Use when no more specific practical risk trait exists yet.
    warning: true
  narrow_therapeutic_window:
    label: Narrow therapeutic window
    description: Nutrient or mineral where useful and excessive doses are close enough
      to require caution.
    applies_when: Use for selenium, copper, and similar narrow-window minerals.
    warning: true
  tmao_cardiometabolic_review:
    label: TMAO cardiometabolic review
    description: Carnitine/choline-class gut-microbiome conversion context where
      TMAO production and cardiovascular risk profile should be reviewed without
      assuming direct harm from the substance alone.
    applies_when: Use for supplemental L-carnitine forms and related precursors when
      the reviewer should surface TMAO/cardiometabolic context.
    warning: true
activity:
  any_workout:
    label: Any workout slot
    description: Training-adjacent marker where pre/post timing is flexible.
    applies_when: Use for workout-associated but timing-flexible substances.
    effects:
    - match:
        near: workout_before
      level: prefer
    - match:
        near: workout_after
      level: prefer
  post_workout:
    label: Post-workout
    description: Timing marker for substances intended after training.
    applies_when: Use when post-exercise timing is central to the intended effect.
    effects:
    - match:
        near: workout_after
      level: prefer_strong
  pre_workout:
    label: Pre-workout
    description: Timing marker for substances intended before training.
    applies_when: Use when pre-exercise timing is central to the intended effect.
    effects:
    - match:
        near: workout_before
      level: prefer_strong
pathway:
  carnitine_shuttle:
    label: Carnitine shuttle
    description: Fatty-acid transport into mitochondria via carnitine-dependent
      transport; reviewer-only pathway context.
    applies_when: Use for L-carnitine forms and closely related carnitine transport
      substances.
  coa_metabolism:
    label: CoA metabolism
    description: Coenzyme A synthesis and acyl-group transfer context; reviewer-only
      pathway grouping for pantothenic-acid/B5-dependent energy and fatty-acid
      metabolism.
    applies_when: Use for vitamin B5 forms that directly supply pantothenic acid
      or pantothenate for coenzyme A synthesis.
  fibrinolysis_coagulation:
    label: Fibrinolysis / coagulation
    description: Fibrin breakdown, platelet aggregation, clotting, or anticoagulant
      context; reviewer-only pathway grouping for bleeding-load review.
    applies_when: Use for nattokinase, antiplatelet substances, anticoagulants, and
      omega-3 components when bleeding/coagulation review is relevant.
  flavin_redox:
    label: Flavin redox
    description: Riboflavin-derived FMN/FAD redox cofactor context; reviewer-only
      pathway grouping for mitochondrial and cellular energy metabolism.
    applies_when: Use for vitamin B2 forms that supply riboflavin or
      riboflavin-5-phosphate/FMNs for flavoprotein cofactor pools.
  methylation_cycle:
    label: Methylation cycle
    description: Substance participates in the one-carbon / methylation pathway as
      cofactor or substrate; Reviewer surfaces methylation pathway membership; not
      used by Planner.
    applies_when: Use for B-vitamins B6/B9/B12, TMG, choline-class substances;
      confirmed when the substance is a documented methylation cofactor.
  nad_metabolism:
    label: NAD metabolism
    description: Niacin-derived NAD/NADP cofactor context for cellular redox and
      ATP-producing metabolism; reviewer-only pathway grouping.
    applies_when: Use for vitamin B3 forms that supply niacin, niacinamide,
      nicotinamide, or related NAD/NADP precursors.
  nitric_oxide_cgmp:
    label: Nitric oxide / cGMP
    description: Nitric-oxide production, PDE5 inhibition, or cGMP-mediated vascular
      tone context; reviewer-only pathway grouping.
    applies_when: Use for L-citrulline, L-arginine, nitrate donors, PDE5 inhibitors,
      and related vasodilator substances.
  omega3_eicosanoid:
    label: Omega-3 / eicosanoid
    description: Long-chain omega-3 fatty acid context affecting eicosanoid balance,
      inflammation signaling, and platelet aggregation; reviewer-only pathway grouping.
    applies_when: Use for EPA, DHA, and direct EPA/DHA sources such as krill oil.
  phosphocreatine_system:
    label: Phosphocreatine system
    description: Creatine/phosphocreatine energy-buffer context for rapid ATP
      regeneration; reviewer-only pathway grouping for workout and mitochondrial
      energy review.
    applies_when: Use for creatine forms that directly support intramuscular
      creatine/phosphocreatine stores.
  thyroid_hormone_axis:
    label: Thyroid hormone axis
    description: Thyroid hormone synthesis, deiodinase conversion, or thyroid
      medication context; reviewer-only pathway grouping.
    applies_when: Use for iodine and selenium forms where thyroid status or thyroid
      medication context should be reviewed.
  thiamine_energy_metabolism:
    label: Thiamine energy metabolism
    description: Thiamine/TPP-dependent carbohydrate oxidation and mitochondrial
      energy-enzyme context; reviewer-only pathway grouping.
    applies_when: Use for vitamin B1 forms that supply thiamine or thiamine
      pyrophosphate/cocarboxylase activity.
  tmao_precursor:
    label: TMAO precursor
    description: Gut-microbiome conversion context where trimethylamine and TMAO
      production may be relevant to cardiometabolic review.
    applies_when: Use for supplemental L-carnitine forms and related precursors where
      reviewer output should surface TMAO context.
