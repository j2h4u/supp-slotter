intake:
  empty_preferred:
    label: Prefers empty stomach
    description: Works or absorbs better away from food, without a hard food block.
    applies_when: Use for amino acids, enzymes, or fast-absorption tablets where food
      reduces but does not eliminate usefulness.
    effects:
    - match:
        food: false
      level: prefer_strong
    - match:
        food: true
      level: avoid
  fat_meal_required:
    label: Requires fat-containing meal
    description: Fat-containing food is the real intake target; current slot model
      approximates this as food=true.
    applies_when: Use for fat-soluble vitamins and carotenoids where dietary fat materially
      improves absorption.
    effects:
    - match:
        food: true
      level: prefer_strong
    - match:
        food: false
      block: true
  food_neutral:
    label: Food neutral
    description: Food state is not a meaningful scheduling driver.
    applies_when: Use when prior empty-stomach or food folklore is too strong for
      the actual evidence.
  food_preferred:
    label: Prefers food
    description: Food improves tolerance or practical use, but empty-stomach intake
      remains acceptable.
    applies_when: Use for B-complex, minerals, and products where food mainly reduces
      nausea or irritation.
    effects:
    - match:
        food: true
      level: prefer
  food_required:
    label: Requires food
    description: Active substance requires food for absorption, stomach tolerance,
      or reliable effect.
    applies_when: Use for substances where taking without food is materially worse;
      use intake:food_preferred for softer tolerance preferences.
    effects:
    - match:
        food: true
      level: prefer_strong
    - match:
        food: false
      block: true
effect:
  energy_like:
    label: Energy-like
    description: Direct wake-promoting or activating effect.
    applies_when: Use for documented activating substances, not general wellness or
      B-vitamin folklore.
    effects:
    - match:
        near: wake
      level: prefer_strong
    - match:
        near: day_meal
      level: prefer
    - match:
        near: sleep
      level: avoid_strong
  sleep_disruptive:
    label: Sleep disruptive
    description: Likely to disrupt sleep and should not be placed near bedtime.
    applies_when: Use for substances with strong wake-promoting or sleep-disruptive
      evidence.
    effects:
    - match:
        near: sleep
      block: true
  sleep_support:
    label: Sleep support
    description: Directly supports sleep onset or sleep quality.
    applies_when: Use for sleep-targeted substances such as glycine or magnesium glycinate.
    effects:
    - match:
        near: sleep
      level: prefer_strong
is:
  adaptogen:
    label: Adaptogen
    description: Plant-derived substance that supports stress resilience and homeostatic
      regulation via HPA-axis or related pathways.
    applies_when: Use for Ashwagandha, Rhodiola, Holy Basil, Bacopa, Cordyceps, Panax
      ginseng, and similar stress-modulating botanicals with clinical adaptogen evidence.
  antioxidant:
    label: Antioxidant
    description: Substance with direct free-radical scavenging or antioxidant-pathway
      support as a primary function.
    applies_when: Use for NAC, quercetin, resveratrol, dihydroquercetin, lipoic acid,
      L-ergothioneine, and similar direct antioxidants. Fat-soluble antioxidants such
      as CoQ10 or astaxanthin may carry both fat_soluble and antioxidant.
  electrolyte:
    label: Electrolyte
    description: Electrolyte marker for sodium, potassium, chloride, and similar ions.
    applies_when: Use for electrolyte components where hydration and electrolyte balance
      are relevant.
  ergogenic:
    label: Ergogenic
    description: Substance with evidence for performance, strength, endurance, or
      exercise-recovery enhancement as a primary positioning.
    applies_when: Use for creatine, L-carnitine, L-citrulline, HICA, beta-alanine,
      L-arginine, and similar workout-performance substances.
  fat_soluble:
    label: Fat-soluble
    description: Fat-soluble nutrient or carotenoid.
    applies_when: Use for vitamins A, D, E, K and fat-soluble carotenoids or oils.
  mineral:
    label: Mineral
    description: Mineral marker; concrete scheduling comes from intake and competition
      traits.
    applies_when: Use for Mg, Ca, Fe, Zn, K, Cu, Se, I, and related minerals.
  nootropic:
    label: Nootropic
    description: Substance with evidence for cognitive support, memory, focus, or
      neuroprotection as a primary positioning.
    applies_when: Use for Alpha-GPC, Lion's Mane, Ginkgo, Huperzia serrata, DMAE,
      and similar cognitive-support substances. Adaptogens with strong cognitive evidence
      such as Bacopa may carry both adaptogen and nootropic.
  omega3:
    label: Omega-3
    description: Long-chain omega-3 fatty acid (EPA or DHA) or a direct whole-source
      that delivers EPA/DHA.
    applies_when: Use for EPA, DHA, and krill oil. Not for ALA-only sources such as
      flaxseed, which are fat_soluble but not omega3.
risk:
  hyperkalemia_med_interaction:
    label: Hyperkalemia medication interaction
    description: Potassium-related medication interaction risk.
    applies_when: Use for potassium-containing substances or formulas where ACEi,
      ARB, NSAID, or K-sparing diuretic context matters.
    warning: true
  manual_review:
    label: Requires manual review
    description: Generic safety or interaction marker for items needing operator attention.
    applies_when: Use when no more specific practical risk trait exists yet.
    warning: true
  narrow_therapeutic_window:
    label: Narrow therapeutic window
    description: Nutrient or mineral where useful and excessive doses are close enough
      to require caution.
    applies_when: Use for selenium, copper, and similar narrow-window minerals.
    warning: true
activity:
  any_workout:
    label: Any workout slot
    description: Training-adjacent marker where pre/post timing is flexible.
    applies_when: Use for workout-associated but timing-flexible substances.
    effects:
    - match:
        near: workout_before
      level: prefer
    - match:
        near: workout_after
      level: prefer
  post_workout:
    label: Post-workout
    description: Timing marker for substances intended after training.
    applies_when: Use when post-exercise timing is central to the intended effect.
    effects:
    - match:
        near: workout_after
      level: prefer_strong
  pre_workout:
    label: Pre-workout
    description: Timing marker for substances intended before training.
    applies_when: Use when pre-exercise timing is central to the intended effect.
    effects:
    - match:
        near: workout_before
      level: prefer_strong
dashboard:
  connective_tissue_support:
    label: Connective Tissue Support
    description: Operator-curated cluster for collagen-synthesis and connective tissue review.
    applies_when: Use for substances supporting collagen synthesis, connective tissue, or related pathways.
  bleeding_load:
    label: Bleeding Load
    description: Operator-curated cluster for anticoagulant and platelet-modulating substance review.
    applies_when: Use for substances with anticoagulant, antiplatelet, or fibrinolytic activity.
  cholinergic_load:
    label: Cholinergic Load
    description: Operator-curated cluster for cholinergic substance review.
    applies_when: Use for substances that increase acetylcholine synthesis, release, or inhibit its breakdown.
  cortisol_reduction:
    label: Cortisol Reduction
    description: Operator-curated cluster for HPA-axis modulating and cortisol-lowering substance review.
    applies_when: Use for substances with evidence for HPA-axis modulation or cortisol reduction.
  electrolyte_hydration_support:
    label: Electrolyte / Hydration Support
    description: Operator-curated cluster for electrolyte and hydration substance review.
    applies_when: Use for electrolyte minerals and substances relevant to hydration status.
  mitochondrial_health:
    label: Mitochondrial Health
    description: Operator-curated cluster for mitochondrial and energy-metabolism substance review.
    applies_when: Use for substances with direct mitochondrial support or energy-metabolism activity.
  neurocognitive_support:
    label: Neurocognitive Support
    description: Operator-curated cluster for cognitive-support substance review.
    applies_when: Use for substances with evidence for cognitive support, memory, or neuroprotection.
  serotonergic_load:
    label: Serotonergic Load
    description: Operator-curated cluster for serotonergic substance review.
    applies_when: Use for substances that modulate serotonin synthesis, release, or reuptake.
  skin_barrier_support:
    label: Skin Barrier Support
    description: Operator-curated cluster for skin-barrier and collagen substance review.
    applies_when: Use for substances supporting skin barrier function, collagen, or dermal health.
  sleep_recovery:
    label: Sleep Recovery
    description: Operator-curated cluster for sleep-support substance review.
    applies_when: Use for substances with evidence for sleep onset, sleep quality, or recovery support.
  vascular_health:
    label: Vascular Health
    description: Operator-curated cluster for vascular-tone and blood-flow substance review.
    applies_when: Use for substances affecting vascular tone, blood flow, or endothelial function.
  antioxidant_protection:
    label: Antioxidant Protection
    description: Operator-curated cluster for antioxidant and anti-inflammatory substance review.
    applies_when: Use for substances with direct antioxidant or anti-inflammatory activity as a primary function.
  workout_performance:
    label: Workout Performance
    description: Operator-curated cluster for ergogenic and workout-performance substance review.
    applies_when: Use for substances with evidence for performance, strength, endurance, or exercise-recovery enhancement.
