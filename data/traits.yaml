version: 1

traits:
  "intake:food_required":
    label: "Requires food"
    description: "Active substance requires food for absorption, stomach tolerance, or reliable effect."
    applies_when: "Use for substances where taking without food is materially worse; use intake:food_preferred for softer tolerance preferences."
    effects:
      - match: {food: true}
        level: prefer_strong
      - match: {food: false}
        block: true

  "intake:food_preferred":
    label: "Prefers food"
    description: "Food improves tolerance or practical use, but empty-stomach intake remains acceptable."
    applies_when: "Use for B-complex, minerals, and products where food mainly reduces nausea or irritation."
    effects:
      - match: {food: true}
        level: prefer

  "intake:empty_preferred":
    label: "Prefers empty stomach"
    description: "Works or absorbs better away from food, without a hard food block."
    applies_when: "Use for amino acids, enzymes, or fast-absorption tablets where food reduces but does not eliminate usefulness."
    effects:
      - match: {food: false}
        level: prefer_strong
      - match: {food: true}
        level: avoid

  "intake:fat_meal_required":
    label: "Requires fat-containing meal"
    description: "Fat-containing food is the real intake target; current slot model approximates this as food=true."
    applies_when: "Use for fat-soluble vitamins and carotenoids where dietary fat materially improves absorption."
    effects:
      - match: {food: true}
        level: prefer_strong
      - match: {food: false}
        block: true

  "intake:food_neutral":
    label: "Food neutral"
    description: "Food state is not a meaningful scheduling driver."
    applies_when: "Use when prior empty-stomach or food folklore is too strong for the actual evidence."

  "effect:energy_like":
    label: "Energy-like"
    description: "Direct wake-promoting or activating effect."
    applies_when: "Use for documented activating substances, not general wellness or B-vitamin folklore."
    effects:
      - match: {near: wake}
        level: prefer_strong
      - match: {near: day_meal}
        level: prefer
      - match: {near: sleep}
        level: avoid_strong

  "effect:nootropic":
    label: "Nootropic / cognitive enhancement"
    description: "Cognitive support without a direct stimulant mechanism."
    applies_when: "Use for Lion's Mane, ALCAR cognitive effects, and similar nootropic substances."
    effects:
      - match: {near: wake}
        level: prefer
      - match: {near: day_meal}
        level: prefer

  "effect:sleep_support":
    label: "Sleep support"
    description: "Directly supports sleep onset or sleep quality."
    applies_when: "Use for sleep-targeted substances such as glycine or magnesium glycinate."
    effects:
      - match: {near: sleep}
        level: prefer_strong

  "effect:calming":
    label: "Calming"
    description: "Mild calming effect without being primarily sleep-directed."
    applies_when: "Use for daytime-compatible calming substances."
    effects:
      - match: {near: sleep}
        level: prefer

  "effect:sleep_disruptive":
    label: "Sleep disruptive"
    description: "Likely to disrupt sleep and should not be placed near bedtime."
    applies_when: "Use for substances with strong wake-promoting or sleep-disruptive evidence."
    effects:
      - match: {near: sleep}
        block: true

  "class:fat_soluble":
    label: "Fat-soluble"
    description: "Fat-soluble nutrient or carotenoid."
    applies_when: "Use for vitamins A, D, E, K and fat-soluble carotenoids or oils."

  "class:mineral":
    label: "Mineral"
    description: "Mineral marker; concrete scheduling comes from intake and competition traits."
    applies_when: "Use for Mg, Ca, Fe, Zn, K, Cu, Se, I, and related minerals."

  "class:electrolyte":
    label: "Electrolyte"
    description: "Electrolyte marker for sodium, potassium, chloride, and similar ions."
    applies_when: "Use for electrolyte components where hydration and electrolyte balance are relevant."

  "competition:magnesium_absorption":
    label: "Magnesium absorption competition"
    description: "Absorption-competition marker for magnesium forms and salts."
    applies_when: "Use for magnesium forms where mineral competition matters."

  "competition:calcium_absorption":
    label: "Calcium absorption competition"
    description: "Absorption-competition marker for calcium forms."
    applies_when: "Use for calcium forms where mineral competition matters."

  "competition:zinc_absorption":
    label: "Zinc absorption competition"
    description: "Absorption-competition marker for zinc forms."
    applies_when: "Use for zinc forms where mineral competition matters."
    separate_from:
      - "competition:copper_absorption"

  "competition:copper_absorption":
    label: "Copper absorption competition"
    description: "Absorption-competition marker for copper forms."
    applies_when: "Use for copper forms where zinc/copper antagonism matters."
    separate_from:
      - "competition:zinc_absorption"

  "mechanism:vasodilator":
    label: "Vasodilator"
    description: "Mechanism marker for substances that can lower vascular tone."
    applies_when: "Use for tadalafil, citrulline, picamilon, and similar vascular-tone substances."

  "mechanism:no_precursor":
    label: "Nitric oxide precursor"
    description: "Mechanism marker for nitric-oxide pathway precursors."
    applies_when: "Use for citrulline/arginine-like substances where NO production is relevant."

  "mechanism:fibrinolytic":
    label: "Fibrinolytic"
    description: "Mechanism marker for fibrin-degrading or fibrinolytic activity."
    applies_when: "Use for nattokinase-like enzymes."

  "risk:manual_review":
    label: "Requires manual review"
    description: "Generic safety or interaction marker for items needing operator attention."
    applies_when: "Use when no more specific practical risk trait exists yet."
    warning: true

  "risk:hypotension_stack":
    label: "Hypotension stack"
    description: "Potential additive blood-pressure lowering when combined with vasodilators or NO-pathway agents."
    applies_when: "Use for tadalafil, citrulline, picamilon, or similar substances."
    warning: true

  "risk:fibrinolytic_bleeding":
    label: "Fibrinolytic bleeding risk"
    description: "Bleeding-risk marker for fibrinolytic enzymes."
    applies_when: "Use for nattokinase-like substances, especially around anticoagulants or surgery."
    warning: true

  "risk:antiplatelet_bleeding":
    label: "Antiplatelet bleeding risk"
    description: "Bleeding-risk marker for platelet-inhibiting supplement effects."
    applies_when: "Use for krill/fish-oil-like products when active or co-used with fibrinolytics."
    warning: true

  "risk:hyperkalemia_med_interaction":
    label: "Hyperkalemia medication interaction"
    description: "Potassium-related medication interaction risk."
    applies_when: "Use for potassium-containing substances or formulas where ACEi, ARB, NSAID, or K-sparing diuretic context matters."
    warning: true

  "risk:narrow_therapeutic_window":
    label: "Narrow therapeutic window"
    description: "Nutrient or mineral where useful and excessive doses are close enough to require caution."
    applies_when: "Use for selenium, copper, and similar narrow-window minerals."
    warning: true

  "activity:pre_workout":
    label: "Pre-workout"
    description: "Timing marker for substances intended before training."
    applies_when: "Use when pre-exercise timing is central to the intended effect."
    effects:
      - match: {near: workout_before}
        level: prefer_strong

  "activity:post_workout":
    label: "Post-workout"
    description: "Timing marker for substances intended after training."
    applies_when: "Use when post-exercise timing is central to the intended effect."
    effects:
      - match: {near: workout_after}
        level: prefer_strong

  "activity:any_workout":
    label: "Any workout slot"
    description: "Training-adjacent marker where pre/post timing is flexible."
    applies_when: "Use for workout-associated but timing-flexible substances."
    effects:
      - match: {near: workout_before}
        level: prefer
      - match: {near: workout_after}
        level: prefer
