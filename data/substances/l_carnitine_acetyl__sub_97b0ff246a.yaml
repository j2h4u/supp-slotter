id: sub_97b0ff246a
name: L-Carnitine
form: acetyl
aliases:
- Acetyl L-Carnitine
- ALCAR
notes: 'Acetylated form of L-carnitine; crosses the blood-brain barrier unlike plain L-carnitine. Dual action: mitochondrial
  support (shuttles acetyl groups into the TCA cycle) and cholinergic modulation (donates acetyl group for ACh synthesis).
  Typical dose 500–2000 mg/day, morning or midday on an empty stomach. TMAO production via gut microbiome warrants caution
  in cardiovascular risk profiles. Sources: examine.com (Acetyl-L-Carnitine), Malaguarnera et al. 2007 (Am J Clin Nutr).'
concerns:
- kind: safety
  text: TMAO cardiovascular risk is gut-microbiome and host-context dependent; surface as cardiometabolic review context rather
    than treating L-carnitine as directly harmful in isolation.
