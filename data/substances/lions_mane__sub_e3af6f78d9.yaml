id: sub_e3af6f78d9
name: Lion's Mane
aliases:
- Hericium erinaceus
traits:
- intake:food_preferred
- effect:nootropic
notes: 'Medicinal mushroom extract. Active compounds: hericenones (fruiting body)
  and erinacines (mycelium) — both stimulate NGF (nerve growth factor) and support
  neuroprotection. Typical dose 500–3000 mg/day, often split. Better with food to
  reduce occasional GI sensitivity. Sources: examine.com (Hericium erinaceus), Mori
  et al. 2009 (Phytotherapy Research).'
