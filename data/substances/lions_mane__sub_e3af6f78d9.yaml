name: Lion's Mane
aliases:
- Hericium erinaceus
- Lion's Mane mushroom
notes: Medicinal mushroom extract. Active compounds include hericenones (fruiting
  body) and erinacines (mycelium). MSKCC describes supplemental Lion's Mane as promoted
  for cognitive health, mood, and immunity; clinical evidence is limited, while
  preclinical work covers neuroprotective, cognition-enhancing, immunomodulatory,
  and wound-healing effects. Better with food to reduce occasional GI sensitivity.
