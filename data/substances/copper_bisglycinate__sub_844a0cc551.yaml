id: sub_844a0cc551
name: Copper
form: bisglycinate
aliases:
- copper glycinate chelate
notes: Chelated copper form used where labels call out bisglycinate/glycinate chelate.
  Copper has a narrow review window; NIH ODS notes high zinc intake can impair
  copper absorption and the adult UL is 10 mg/day. Copper is a cuproenzyme cofactor
  for energy production, iron metabolism, connective tissue synthesis, neurotransmitter
  synthesis, and copper-containing superoxide dismutases.
