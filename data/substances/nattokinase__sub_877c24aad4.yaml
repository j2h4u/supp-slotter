      limitations: Small pilot with unknown bioavailability and no fed-versus-fasted comparison; it does not support empty_preferred.
    - source: enzyme.E6
      supports: A single oral dose changed selected coagulation and fibrinolysis markers in healthy participants.
      limitations: Small acute biomarker study with no fed-versus-fasted comparison or clinical outcome.
