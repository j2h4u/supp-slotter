id: sub_844a87d72b
name: Vitamin E
form: tocopherol
traits:
- class:fat_soluble
- intake:food_required
- risk:manual_review
notes: Fat-soluble tocopherol component of the dihydroquercetin complex. Fat-soluble
  components A and E are the formula scheduling bottleneck. Vitamin E can support
  vitamin A bioavailability in supplement context; sources include WHO vitamin A supplement
  technical note, AJCN vitamin E/vitamin A absorption study. LPI notes vitamin E
  protects PUFA from oxidation and omega-3 PUFA intake may warrant vitamin E context.
relations:
- type: supports
  substances:
  - sub_31a1408cad
  reason: Vitamin E can improve vitamin A bioavailability/absorption in supplement
    context.
- type: supports
  substances:
  - sub_66b783576c
  reason: Vitamin E helps protect polyunsaturated fatty acids from lipid peroxidation;
    LPI notes higher omega-3 PUFA intake may warrant vitamin E context.
- type: antagonizes
  substances:
  - sub_1hhkguyz55
  - sub_shib6nr9jc
  reason: High-dose vitamin E can antagonize vitamin K-dependent clotting factors;
    review together when vitamin E is active.
