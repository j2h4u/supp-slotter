name: Aloe vera
aliases:
- Aloe barbadensis
- aloe gel
- aloe latex
- decolorized aloe whole leaf
notes: Knowledge-only aloe product-form reference card. Added because aloe is a very common topical and oral supplement category,
  but oral gel, latex, and whole-leaf extracts have materially different safety meanings. Source checked - NCCIH aloe vera
  usefulness and safety page.
concerns:
- kind: safety
  text: Review whether the product is topical gel, oral gel, aloe latex, or whole-leaf extract; oral latex/whole-leaf products
    raise diarrhea, electrolyte, kidney, liver, pregnancy, and medication-absorption concerns.
- kind: data_quality
  text: Product cards should capture oral versus topical use, decolorized status, aloin/anthraquinone content, dose, duration,
    and whether the product is a drink, capsule, gel, or blended formula.
