name: Tadalafil
notes: 'PDE5 inhibitor. Off-label low-dose use (~1.25–2.5 mg/day) for vascular tone and endothelial function. Half-life ~17h; food does not significantly affect absorption at low dose. Typically taken in the morning. Synergistic vasodilation alongside L-Citrulline and Nattokinase. Source: FDA label; Kloner et al. 2013 (J Cardiovasc Pharmacol Ther).'
