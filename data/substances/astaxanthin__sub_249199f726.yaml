name: Astaxanthin
notes: 'Carotenoid antioxidant from Haematococcus pluvialis microalgae (or krill).
  Bioavailability is significantly reduced without dietary fat — take with a fat-containing
  meal. Typical dose 4–12 mg/day. Sources: examine.com (Astaxanthin); Fassett & Coombes
  2011, Marine Drugs.'
