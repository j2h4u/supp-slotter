id: sub_7628e4f478
name: Vitamin B5
form: pantothenic acid
notes: 'Water-soluble vitamin, form pantothenic acid. Essential cofactor for CoA synthesis
  and fatty acid metabolism. Typical supplemental dose 5-15 mg/day; well-tolerated
  even at higher doses (UL not established). Mild GI discomfort possible on empty
  stomach — take with food. Source: NIH ODS (Pantothenic Acid Fact Sheet). Coenzyme
  B-Complex also supplies pantethine, an active B5-related form.'
