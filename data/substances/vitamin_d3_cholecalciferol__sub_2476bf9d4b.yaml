id: sub_2476bf9d4b
name: Vitamin D3
form: cholecalciferol
notes: Жирорастворимый витамин, форма cholecalciferol. Биодоступность значительно выше с приёмом, содержащим жиры (eggs, yogurt,
  avocado, butter). NIH ODS notes that vitamin D supports calcium absorption and that adult UL is usually 4000 IU/day; 10000
  IU/day belongs in lab-guided review with 25(OH)D, calcium, and hypercalcemia context rather than routine background dosing.
