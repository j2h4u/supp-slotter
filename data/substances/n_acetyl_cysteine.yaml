id: n_acetyl_cysteine
name: N-Acetyl Cysteine (NAC)
traits:
- intake:prefers_food
- risk:manual_review
notes: 'Water-soluble glutathione precursor and mucolytic; also used as antidote in acetaminophen overdose. Typical supplemental dose 600–1800 mg/day, often split. GI tolerance (nausea, upset) is improved when taken with food. Known interaction with nitroglycerin (severe hypotension); caution with anticoagulants and chemotherapy agents. Sources: NIH MedlinePlus (Acetylcysteine); examine.com (NAC); Millea 2009 (Am Fam Physician).'
unmatched_concerns:
