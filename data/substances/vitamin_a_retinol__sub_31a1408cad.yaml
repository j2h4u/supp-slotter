id: sub_31a1408cad
name: Vitamin A
form: retinol
traits:
- class:fat_soluble
- intake:food_required
- risk:manual_review
notes: Fat-soluble retinol component of the dihydroquercetin complex. Fat-soluble
  components A and E are the formula scheduling bottleneck; vitamin A carries toxicity
  and teratogenicity concerns at high dose. Vitamin E can support vitamin A
  bioavailability in supplement context; sources include WHO vitamin A supplement technical
  note, AJCN vitamin E/vitamin A absorption study.
