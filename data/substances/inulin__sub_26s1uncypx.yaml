notes: Knowledge-only prebiotic soluble-fiber reference card. Added because inulin/chicory root fiber is one of the most common
  prebiotic supplement and functional-food ingredients. Sources checked - FDA dietary-fiber review pages; NCCIH probiotics/prebiotics
  safety context; NIH ODS probiotics fact sheet.
concerns:
- kind: safety
  text: Review IBS/FODMAP sensitivity, bloating, gas, dose titration, and whether the product is inulin, FOS, or another prebiotic
    fiber; tolerance can differ materially by dose and fructan type.
- kind: data_quality
  text: Product cards should record grams per serving and fiber type; do not treat tiny blend amounts as meaningful prebiotic
    or lipid-metabolism coverage.
