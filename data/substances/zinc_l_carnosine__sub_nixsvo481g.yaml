  from generic zinc plus generic L-carnosine. Source checked - PubMed review on zinc
  L-carnosine in gastrointestinal mucosal disease.
concerns:
- kind: safety
  text: Review cumulative elemental zinc, copper status, medication separation, gastric
    disease context, pregnancy, and whether symptoms require medical evaluation rather
    than supplement trial.
- kind: data_quality
  text: Product cards should record elemental zinc amount, zinc L-carnosine complex
    amount, brand/trademark, dose timing, and whether other mucosal-support botanicals
    are co-formulated.
