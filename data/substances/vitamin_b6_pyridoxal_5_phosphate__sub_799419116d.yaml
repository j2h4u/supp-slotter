id: sub_799419116d
name: Vitamin B6
form: pyridoxal 5 phosphate
notes: 'Active/coenzymated B6 form used by the Coenzyme B-Complex product. Preferred
  for long-term use — P5P does not accumulate as a pseudo-antagonist and carries significantly
  lower neuropathy risk than pyridoxine HCl at comparable doses. Review context:
  B6 coenzyme forms participate in amino-acid/protein metabolism, neurotransmitter
  biosynthesis, and homocysteine handling.'
