name: Mastic gum
aliases:
- Chios mastic
- Pistacia lentiscus resin
- Pistacia lentiscus var. chia
notes: Knowledge-only resin/botanical digestive reference card. Added because mastic gum is a common upper-GI and H. pylori-adjacent
  supplement category, but it should not be treated as eradication therapy or a substitute for diagnostic care. Sources checked
  - PubMed reviews on Chios mastic gum and Pistacia lentiscus.
concerns:
- kind: safety
  text: Review tree-nut/resin allergy context, pregnancy/breastfeeding, medication history, H. pylori testing/treatment context,
    and persistent alarm GI symptoms before practical use discussion.
- kind: data_quality
  text: Product cards should distinguish true Chios/Pistacia lentiscus resin from flavored chewing gum, record resin amount,
    capsule/powder/chewable form, and whether it is combined with bismuth, botanicals, or antimicrobials.
