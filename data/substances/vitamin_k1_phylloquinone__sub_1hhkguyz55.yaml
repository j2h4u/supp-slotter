notes: 'Fat-soluble vitamin K form found mainly in green leafy vegetables. Vitamin
  K is required for gamma-carboxylation of vitamin K-dependent proteins involved in
  coagulation and bone metabolism. Consistent intake matters with warfarin or related
  anticoagulant therapy. Sources: NIH ODS Vitamin K Fact Sheet; Linus Pauling Institute
  Vitamin K.'
