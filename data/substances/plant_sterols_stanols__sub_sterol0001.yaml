id: sub_sterol0001
name: Plant sterols / stanols
aliases:
- phytosterols
- plant sterol esters
- plant stanol esters
notes: Phytosterol/phytostanol cholesterol-absorption-reduction context. FDA health-claim
  regulation states that including plant sterol/stanol esters in the diet helps
  lower blood total and LDL cholesterol, with associated daily intake levels of
  1.3 g/day plant sterol esters or 3.4 g/day plant stanol esters in divided servings
  with meals.
concerns:
- kind: safety
  text: Review sitosterolemia/familial phytosterolemia context and fat-soluble carotenoid
    status before treating chronic high-dose phytosterol use as routine.
schedule:
  intake:
  - food_required
knowledge:
  is:
  - phytosterol
  effect:
  - lipid_metabolism_support
  - fat_digestion_support
