id: sub_cowvco2tzs
name: Pycnogenol
aliases:
- French maritime pine bark extract
- Pinus pinaster bark extract
- Maritime pine bark extract
- Pine bark extract
notes: Pycnogenol is a proprietary French maritime pine bark extract rich in procyanidins and related polyphenols. Human clinical
  literature often frames it around antioxidant, anti-inflammatory, endothelial, microcirculation, and extracellular-matrix
  support, but product equivalence should not be assumed for generic pine bark extracts. Source refs include PMID 38757130
  and PMID 30087862.
concerns:
- kind: safety
  text: Review with antihypertensive, anticoagulant, or antiplatelet medication context before active use; vascular/endothelial
    and platelet-related signals are review context, not automatic scheduling rules.
- kind: data_quality
  text: Treat Pycnogenol as a proprietary standardized extract; generic pine bark extracts should not be assumed equivalent
    unless the product label and standardization justify it.
