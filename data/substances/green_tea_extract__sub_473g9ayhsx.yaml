name: Green tea extract
aliases:
- Camellia sinensis extract
- EGCG source
notes: Polyphenol-rich extract of Camellia sinensis; usually standardized to EGCG. Higher-potency products may carry mild
  stimulant/CYP-modulating effects, but multivitamin-blend doses are typically sub-therapeutic. Review context - concentrated
  green tea extract has rare liver-injury reports, especially relevant when EGCG dose and food timing are unknown. NCCIH describes
  green tea cholesterol evidence as limited, so use lipid context as a weak/modest review signal rather than a primary LDL-C
  tool.
