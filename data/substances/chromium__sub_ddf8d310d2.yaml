id: sub_ddf8d310d2
name: Chromium
notes: Generic elemental chromium contribution. Product cards keep the concrete
  source form in component labels and notes. NIH ODS describes trivalent chromium
  as an insulin-action / glucose-metabolism review context, but evidence for
  routine glycemic benefit is mixed and not clinically decisive for healthy users.
concerns:
- kind: safety
  text: Review if insulin, metformin, other antidiabetes medication, or levothyroxine
    is present; NIH ODS notes possible additive hypoglycemia risk with antidiabetes
    medications and reduced levothyroxine absorption when co-administered.
schedule:
  intake:
  - food_preferred
knowledge:
  is:
  - mineral
  risk:
  - glucose_med_interaction
