notes: 'Glycinate форма: высокая биодоступность, низкое слабительное действие. Глицин в составе сам по себе sleep-supportive (synergy с Mg). Типичная доза элементарного Mg 200-400 mg вечером, за 30-60 мин до сна. Severe Mg deficiency can disrupt calcium homeostasis. Sources: examine.com (Magnesium glycinate); LPI Magnesium (https://lpi.oregonstate.edu/mic/minerals/magnesium).'
