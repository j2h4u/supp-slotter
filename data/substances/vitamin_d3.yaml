id: vitamin_d3
name: Vitamin D3 (cholecalciferol)
traits:
- class:fat_soluble
- intake:requires_food
notes: 'Жирорастворимый витамин, форма cholecalciferol. Биодоступность значительно выше с приёмом, содержащим жиры (eggs, yogurt, avocado, butter). Типичная доза 2000-5000 IU/день; до 10000 IU при дефиците (по уровню 25(OH)D). Источник: NIH ODS (Vitamin D Fact Sheet).'
