id: sub_25b049a598
name: Boron
notes: Generic elemental boron contribution. Product cards keep the concrete source
  form in component labels and notes. NIH ODS says boron is not classified as an
  essential human nutrient, but may affect calcium metabolism, bone formation,
  brain function, insulin/energy-substrate metabolism, immunity, and steroid
  hormone function including vitamin D and estrogen.
