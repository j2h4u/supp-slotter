  - substance: nattokinase
    status: taking
    role: "Fibrinolytic — растворение фибриновых сгустков, профилактика тромбозов"
  - substance: tadalafil
    status: taking
    role: "PDE5 inhibition — низкодозная пролонгированная вазодилатация (off-label vascular tone)"
  - substance: vitamin_b5
    status: taking
    role: "Pantothenic acid — кофактор CoA, поддержка липидного метаболизма (cholesterol/HDL)"
