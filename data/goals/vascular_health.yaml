id: vascular_health
name: "Vascular Health"
description: "Поддержка тонуса сосудов и кровотока: NO-вазодилатация, фибринолитическая активность, PDE5-модуляция, метаболическая поддержка липидного обмена. Синергия nattokinase + L-citrulline + tadalafil — основной кардиоваскулярный кластер operator'а."
status: active

