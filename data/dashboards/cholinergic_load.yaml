name: Cholinergic Load
description: Cluster for reviewing combined cholinergic tone in the active stack.
risk:
  description: Multiple active cholinergic substances may create excessive cholinergic
    load.
  warning_threshold: 2
  action: Review combined cholinergic load, especially if sleep disturbance, vivid
    dreams, anxiety, or tachycardia appear.
taking:
- substance: sub_tzg5glskrd
  role: Alpha-GPC — direct choline donor
- substance: sub_kzmof56wwf
  role: Bacopa monnieri — established acetylcholinesterase inhibitor; raises ACh and
    contributes to cholinergic load
- substance: sub_p62urjkldd
  role: Choline — direct choline source
- substance: sub_5j1kg3bmgk
  role: DMAE — cholinergic/nootropic context
- substance: sub_dxmcmi4hsk
  role: Holy basil — preclinical evidence for choline acetyltransferase upregulation
    and AChE inhibition in cerebral microvascular endothelium
- substance: sub_963hw8lx1a
  role: Huperzia serrata extract — huperzine-A acetylcholinesterase-inhibitor context
- substance: sub_97b0ff246a
  role: Acetyl L-Carnitine — acetyl donor / cholinergic modulation context
- substance: sub_dcxfwd4udf
  role: Phosphatidylcholine — choline-containing phospholipid
