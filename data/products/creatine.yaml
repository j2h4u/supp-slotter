id: creatine
name: "Creatine monohydrate"

traits:
  - "intake:prefers_empty_stomach"
  - "activity:any_workout"

prefer_with:
  - "l_citrulline_malate"

notes: "Creatine monohydrate — наиболее изученная форма. Типичная доза 3-5 g/день, loading не обязателен. Абсорбция максимальна без конкурирующих веществ; совместный приём с углеводами (инсулиновый спайк) теоретически усиливает uptake в мышцы, но эффект умеренный и не критичный для большинства протоколов. Timing (pre vs post workout) не имеет клинически значимого превосходства. Источник: examine.com (Creatine), Lanhers et al. 2017 (Eur J Sport Sci)."

unmatched_concerns:
  - "Performance / strength enhancement (PCr resynthesis) — no trait covers ergogenic effect category"
  - "Post-workout co-ingestion with carbs may modestly improve uptake — no trait for 'synergy with carbohydrates'"
