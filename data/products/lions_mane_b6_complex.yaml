notes: "Russian-market capsule combining Lion's Mane mushroom extract (~150 mg per cap) with trace vitamin B6 (~1 mg per cap). Active compounds are hericenones/erinacines from Lion's Mane, which stimulate NGF and support neuroprotection. The B6 dose is below a meaningful supplemental threshold and does not alter scheduling — product behaves as Lion's Mane. Better taken with food to reduce occasional GI sensitivity. Source: Vitamir label; examine.com (Hericium erinaceus); Mori et al. 2009 (Phytotherapy Research)."

