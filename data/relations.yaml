  reason: Incretin drugs affect glucose regulation; glucose-lowering supplement contexts can complicate glycemic monitoring
    or add hypoglycemia risk, especially when insulin or insulin secretagogues are also present.
  action: Review glycemic medications, fasting glucose/CGM pattern, hypoglycemia symptoms, and whether glucose-lowering supplements
    are still needed.
  id: rel_review_with_013
  type: review_with
  source_selector:
    category: effect
    term: incretin_drug_context
  target_selector:
    category: risk
    term: glucose_med_interaction
- severity: low
  reason: Metformin and GLP-1/GIP/incretin drugs are commonly combined clinically, but both can contribute to gastrointestinal
    intolerance and the combination changes glycemic interpretation.
  action: Review prescribing context, GI tolerance, hydration, B12 status, renal context, and glucose monitoring rather than
    treating the pair as independent.
  id: rel_review_with_014
  type: review_with
  source_selector:
