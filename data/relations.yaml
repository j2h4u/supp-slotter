    category: effect
    term: incretin_drug_context
- severity: low
  reason: Creatine supports phosphocreatine availability, training output, and lean-mass retention context during calorie
    deficit; it is an adjunctive support signal, not a GLP requirement.
  action: Review resistance training, creatine tolerance, kidney-context assumptions, and total lean-mass preservation strategy.
  id: rel_supports_011
  type: supports
  source_selector:
