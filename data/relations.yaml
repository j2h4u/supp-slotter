- severity: medium
  reason: Direct nitric-oxide, nitrate, citrulline, or arginine-donor support and PDE5 inhibition converge on vasodilation
    and cGMP signaling; co-presence should be reviewed for additive blood-pressure lowering rather than treated as independent
    vascular support.
  action: Review symptomatic hypotension context when direct NO-support and PDE5-inhibitor substances are both active, especially
    with nitrates, alpha-blockers, antihypertensives, alcohol, or baseline low blood pressure.
  id: rel_review_with_001
  type: review_with
  source_selector:
    category: effect
    term: nitric_oxide_support
  target_selector:
    category: effect
    term: pde5_inhibition
