- severity: low
  reason: GLP-1/GIP/incretin drugs can reduce appetite and total intake; adequate protein is a practical lean-mass preservation
    context during weight loss, while whey is only one possible protein source.
  action: Review total dietary protein and resistance-training context before treating a GLP-assisted weight-loss stack as
    metabolically complete.
