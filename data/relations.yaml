  reason: GLP-1/GIP/incretin drugs slow gastric emptying and commonly cause GI adverse effects; viscous or fermentable fibers
    can add bloating, constipation, satiety load, or oral-medication absorption complexity.
  action: Review fiber type, dose titration, water intake, constipation/bloating, and medication separation timing.
  id: rel_review_with_015
  type: review_with
  source_selector:
    category: effect
    term: incretin_drug_context
  target_selector:
